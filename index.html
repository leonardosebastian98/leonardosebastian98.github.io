<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Multi-Equipo - TM</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; padding: 20px; }
    .container { max-width: 1600px; margin: 0 auto; }
    .header { background: white; border-radius: 12px; padding: 30px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header h1 { font-size: 2em; color: #1a1a1a; margin-bottom: 5px; }
    .header .subtitle { color: #666; font-size: 0.95em; }
    .controls-global { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .time-filters { display: flex; gap: 8px; background: #f8f9fa; padding: 4px; border-radius: 8px; }
    .time-btn { padding: 8px 16px; border: none; background: transparent; color: #666; font-size: 0.9em; font-weight: 500; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
    .time-btn:hover { background: #e9ecef; color: #1a1a1a; }
    .time-btn.active { background: #0066ff; color: white; }
    .point-size-control { display: flex; align-items: center; gap: 10px; }
    .point-size-control label { color: #666; font-size: 0.9em; }
    .refresh-btn { padding: 8px 16px; background: #0066ff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: 500; transition: all 0.2s; }
    .refresh-btn:hover { background: #0052cc; }
    .equipment-card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .equipment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
    .equipment-title { font-size: 1.4em; font-weight: 600; color: #1a1a1a; }
    .equipment-stats { display: flex; gap: 20px; font-size: 0.9em; color: #666; }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-value { font-size: 1.3em; font-weight: 600; color: #0066ff; }
    .stat-label { font-size: 0.85em; color: #999; }
    .chart-wrapper { position: relative; height: 350px; }
    .chart-legend { display: flex; gap: 20px; justify-content: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e9ecef; font-size: 0.85em; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .no-data { text-align: center; padding: 40px; color: #999; font-style: italic; }
    .pulse { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .update-info { display: flex; align-items: center; gap: 8px; font-size: 0.85em; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Monitor Multi-Equipo - TM</h1>
      <div class="subtitle">Escala de tiempo real optimizada</div>
    </div>
    <div class="controls-global">
      <div class="point-size-control">
        <label>Tamaño:</label>
        <input type="range" id="globalPointSize" min="1" max="10" value="4" style="width:100px" oninput="updateAllPointSizes(this.value)">
        <span id="globalPointSizeValue">4px</span>
      </div>
      <div class="time-filters">
        <button class="time-btn" onclick="filterAllTime(60)">1H</button>
        <button class="time-btn" onclick="filterAllTime(360)">6H</button>
        <button class="time-btn" onclick="filterAllTime(720)">12H</button>
        <button class="time-btn active" onclick="filterAllTime(1440)">24H</button>
        <button class="time-btn" onclick="filterAllTime(10080)">SEMANA</button>
      </div>
      <div style="display:flex;align-items:center;gap:15px">
        <div class="update-info"><div class="pulse"></div><span id="globalUpdate">...</span></div>
        <button class="refresh-btn" onclick="refreshAllData()">↻ Actualizar</button>
      </div>
    </div>
    <div id="equipmentContainer"></div>
  </div>
  <script>
    const CONFIG = {
      csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVrHs_GXmZGUMaOBjo4zr6mtNbFpf45WZ916Bj6LktK0i1F1gofWV_dnZfjam7MAbhDoQap_nZryeO/pub?gid=0&single=true&output=csv',
      filterCode: 'TM',
      updateInterval: 10000
    };

    let equipmentData = {}, charts = {}, currentFilter = 1440, currentPointSize = 4, lastDataHash = '';

    function generateDataHash(data) {
      const keys = Object.keys(data).sort();
      let h = '';
      keys.forEach(e => {
        const d = data[e];
        if (d.length > 0) {
          const l = d[d.length - 1];
          h += `${e}-${d.length}-${l.datetime.getTime()}-${l.value}|`;
        }
      });
      return h;
    }

    async function loadData() {
      try {
        const r = await fetch(CONFIG.csvUrl);
        if (!r.ok) throw new Error(`HTTP:${r.status}`);
        processData(await r.text());
        return true;
      } catch (e) {
        console.error('❌', e);
        showError(`Error:${e.message}`);
        return false;
      }
    }

    function processData(csv) {
      const lines = csv.split('\n'), dataByEq = {}, seen = {};
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const c = line.split(',');
        if (c.length < 8) continue;
        const eq = c[2]?.trim(), cod = c[6]?.trim(), date = c[4]?.trim(), time = c[5]?.trim(), val = parseInt(c[7]?.trim()) || 0;
        if (cod === CONFIG.filterCode && eq) {
          if (!dataByEq[eq]) {
            dataByEq[eq] = [];
            seen[eq] = new Set();
          }
          const key = `${date}-${time}`;
          if (!seen[eq].has(key)) {
            seen[eq].add(key);
            const dt = parseDateTime(date, time);
            if (dt) dataByEq[eq].push({ datetime: dt, value: val });
          }
        }
      }
      for (let eq in dataByEq) dataByEq[eq].sort((a, b) => a.datetime - b.datetime);
      const newHash = generateDataHash(dataByEq);
      if (newHash !== lastDataHash) {
        console.log(`✅ ${Object.keys(dataByEq).length} equipos`);
        equipmentData = dataByEq;
        lastDataHash = newHash;
        renderEquipmentCharts();
      } else console.log('ℹ️ Sin cambios');
      updateGlobalTimestamp();
    }

    function parseDateTime(d, t) {
      try {
        const dp = d.split('/');
        let day = parseInt(dp[0]), mon = parseInt(dp[1]), year = parseInt(dp[2]);
        if (year < 100) year = year < 50 ? 2000 + year : 1900 + year;
        const tp = t.split(':'), h = parseInt(tp[0]) || 0, m = parseInt(tp[1]) || 0, s = parseInt(tp[2]) || 0;
        return new Date(year, mon - 1, day, h, m, s);
      } catch {
        return null;
      }
    }

    function renderEquipmentCharts() {
      const cont = document.getElementById('equipmentContainer'), eqs = Object.keys(equipmentData).sort();
      if (eqs.length === 0) {
        cont.innerHTML = '<div class="no-data">No hay datos</div>';
        return;
      }
      eqs.forEach(eq => {
        if (!document.getElementById(`equipment-${eq}`)) cont.appendChild(createEquipmentCard(eq));
        updateEquipmentChart(eq);
      });
      const cards = cont.querySelectorAll('.equipment-card');
      cards.forEach(card => {
        const id = card.id.replace('equipment-', '');
        if (!eqs.includes(id)) {
          card.remove();
          delete charts[id];
        }
      });
    }

    function createEquipmentCard(eq) {
      const card = document.createElement('div');
      card.className = 'equipment-card';
      card.id = `equipment-${eq}`;
      card.innerHTML = `<div class="equipment-header"><div class="equipment-title">Equipo ${eq}</div><div class="equipment-stats"><div class="stat-item"><div class="stat-value" id="stat-total-${eq}">0</div><div class="stat-label">Procesos</div></div><div class="stat-item"><div class="stat-value" id="stat-avg-${eq}">0</div><div class="stat-label">Promedio (s)</div></div></div></div><div class="chart-wrapper"><canvas id="chart-${eq}"></canvas></div><div class="chart-legend"><div class="legend-item"><div class="legend-dot" style="background:#0066ff"></div><span>Procesos</span></div><div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div><span>Perdidas</span></div></div>`;
      return card;
    }

    function updateEquipmentChart(eq) {
      let data = equipmentData[eq] || [];
      if (currentFilter !== null && data.length > 0) {
        const now = new Date(), cutoff = new Date(now.getTime() - (currentFilter * 60 * 1000));
        data = data.filter(d => d.datetime >= cutoff);
      }
      if (data.length === 0) return;
      
      let avgInt = 0;
      if (data.length > 1) {
        let tot = 0;
        for (let i = 1; i < data.length; i++) tot += (data[i].datetime - data[i - 1].datetime);
        avgInt = tot / (data.length - 1);
      }
      
      const avgVal = Math.round(data.reduce((s, d) => s + d.value, 0) / data.length);
      const complete = [];
      let lastRealTime = null;
      
      for (let i = 0; i < data.length; i++) {
        const cur = data[i];
        
        // Verificar si hay gap antes de este punto
        if (lastRealTime && avgInt > 0) {
          const gap = cur.datetime - lastRealTime;
          
          if (gap > avgInt * 3) {
            // Hay gap - rellenar con amarillos
            let pt = new Date(lastRealTime.getTime() + avgInt);
            while (pt < cur.datetime) {
              complete.push({ x: pt.getTime(), y: avgVal, isProjected: true });
              pt = new Date(pt.getTime() + avgInt);
            }
            
            // El punto actual (azul) se coloca en el promedio desde el último amarillo
            const adjustedTime = new Date(pt.getTime() - avgInt + avgInt);
            complete.push({ x: adjustedTime.getTime(), y: cur.value, isProjected: false });
          } else {
            // No hay gap - punto azul en su tiempo real
            complete.push({ x: cur.datetime.getTime(), y: cur.value, isProjected: false });
          }
        } else {
          // Primer punto - siempre en tiempo real
          complete.push({ x: cur.datetime.getTime(), y: cur.value, isProjected: false });
        }
        
        lastRealTime = cur.datetime;
      }
      
      // Proyecciones hasta ahora
      const now = new Date(), since = now - lastRealTime;
      if (avgInt > 0 && since > avgInt * 3) {
        let pt = new Date(lastRealTime.getTime() + avgInt);
        while (pt <= now) {
          complete.push({ x: pt.getTime(), y: avgVal, isProjected: true });
          pt = new Date(pt.getTime() + avgInt);
        }
      }
      
      document.getElementById(`stat-total-${eq}`).textContent = data.length;
      document.getElementById(`stat-avg-${eq}`).textContent = avgVal;
      
      const colors = complete.map(d => d.isProjected ? '#fbbf24' : '#0066ff');
      
      // Configurar divisiones según filtro
      let timeUnit = 'hour', timeStep = 1;
      if (currentFilter === 60) {
        timeUnit = 'minute';
        timeStep = 5;
      } else if (currentFilter === 360) {
        timeUnit = 'minute';
        timeStep = 15;
      } else if (currentFilter === 720) {
        timeUnit = 'minute';
        timeStep = 30;
      } else if (currentFilter === 1440) {
        timeUnit = 'hour';
        timeStep = 1;
      } else if (currentFilter === 10080) {
        timeUnit = 'day';
        timeStep = 1;
      }
      
      const ctx = document.getElementById(`chart-${eq}`).getContext('2d');
      
      if (charts[eq]) {
        charts[eq].data.datasets[0].data = complete;
        charts[eq].data.datasets[0].pointBackgroundColor = colors;
        charts[eq].options.scales.x.time.unit = timeUnit;
        charts[eq].options.scales.x.time.stepSize = timeStep;
        charts[eq].update('none');
      } else {
        charts[eq] = new Chart(ctx, {
          type: 'scatter',
          data: {
            datasets: [{
              data: complete,
              pointRadius: currentPointSize,
              pointBackgroundColor: colors,
              pointBorderWidth: 0,
              showLine: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: 'rgba(0,0,0,0.8)',
                padding: 10,
                displayColors: false,
                callbacks: {
                  title: i => new Date(i[0].parsed.x).toLocaleString('es-AR'),
                  label: c => {
                    const p = c.dataset.pointBackgroundColor[c.dataIndex] === '#fbbf24';
                    return (p ? '⚠️ Perdida: ' : 'Tiempo: ') + c.parsed.y + ' seg';
                  }
                }
              }
            },
            scales: {
              x: {
                type: 'time',
                time: {
                  unit: timeUnit,
                  stepSize: timeStep,
                  displayFormats: {
                    hour: 'HH:mm',
                    minute: 'HH:mm',
                    day: 'dd/MM'
                  }
                },
                grid: { color: 'rgba(0,0,0,0.05)' },
                ticks: {
                  color: '#666',
                  maxRotation: 0,
                  autoSkip: false
                }
              },
              y: {
                beginAtZero: true,
                grid: { color: 'rgba(0,0,0,0.05)' },
                ticks: { color: '#666' }
              }
            }
          }
        });
      }
    }

    function filterAllTime(min) {
      currentFilter = min;
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      Object.keys(equipmentData).forEach(eq => updateEquipmentChart(eq));
    }

    function updateAllPointSizes(s) {
      currentPointSize = parseInt(s);
      document.getElementById('globalPointSizeValue').textContent = s + 'px';
      Object.keys(charts).forEach(eq => {
        if (charts[eq]) {
          charts[eq].data.datasets[0].pointRadius = currentPointSize;
          charts[eq].update('none');
        }
      });
    }

    async function refreshAllData() {
      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = '↻ ...';
      await loadData();
      btn.disabled = false;
      btn.innerHTML = '↻ Actualizar';
    }

    function updateGlobalTimestamp() {
      document.getElementById('globalUpdate').textContent = `Última: ${new Date().toLocaleTimeString('es-AR')}`;
    }

    function showError(m) {
      document.getElementById('equipmentContainer').innerHTML = `<div class="equipment-card"><div class="no-data">❌ ${m}</div></div>`;
    }

    setInterval(() => loadData(), CONFIG.updateInterval);
    loadData();
  </script>
</body>
</html>
