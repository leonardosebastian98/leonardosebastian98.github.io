<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Multi-Equipo - TM</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f8f9fa; 
      padding: 20px; 
      transition: background 0.3s, color 0.3s;
    }
    body.dark { background: #1a1a1a; color: #e0e0e0; }
    .container { max-width: 1800px; margin: 0 auto; }
    .header { 
      background: white; 
      border-radius: 12px; 
      padding: 30px; 
      margin-bottom: 20px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      flex-wrap: wrap; 
      gap: 15px; 
      transition: background 0.3s, box-shadow 0.3s;
    }
    body.dark .header { background: #2d2d2d; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .header h1 { font-size: 2em; color: #1a1a1a; transition: color 0.3s; }
    body.dark .header h1 { color: #e0e0e0; }
    .header .subtitle { color: #666; font-size: 0.95em; transition: color 0.3s; }
    body.dark .header .subtitle { color: #999; }
    .header-controls { display: flex; gap: 15px; align-items: center; }
    .theme-toggle { 
      padding: 8px 12px; 
      background: #f0f0f0; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 1.2em; 
      transition: all 0.3s;
    }
    body.dark .theme-toggle { background: #3d3d3d; }
    .theme-toggle:hover { background: #e0e0e0; transform: scale(1.1); }
    body.dark .theme-toggle:hover { background: #4d4d4d; }
    .machine-selector { display: flex; align-items: center; gap: 10px; }
    .machine-selector label { color: #666; font-weight: 500; transition: color 0.3s; }
    body.dark .machine-selector label { color: #999; }
    .machine-selector select { 
      padding: 8px 12px; 
      border: 2px solid #e9ecef; 
      border-radius: 6px; 
      font-size: 0.9em; 
      cursor: pointer; 
      background: white; 
      transition: all 0.3s;
    }
    body.dark .machine-selector select { background: #3d3d3d; border-color: #555; color: #e0e0e0; }
    .equipment-card { 
      background: white; 
      border-radius: 12px; 
      padding: 25px; 
      margin-bottom: 20px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
      transition: background 0.3s, box-shadow 0.3s;
    }
    body.dark .equipment-card { background: #2d2d2d; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .equipment-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 15px; 
      padding-bottom: 15px; 
      border-bottom: 2px solid #f0f0f0; 
      transition: border-color 0.3s;
    }
    body.dark .equipment-header { border-bottom-color: #444; }
    .equipment-title { font-size: 1.4em; font-weight: 600; color: #1a1a1a; transition: color 0.3s; }
    body.dark .equipment-title { color: #e0e0e0; }
    .equipment-stats { display: flex; gap: 20px; font-size: 0.9em; }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-value { font-size: 1.3em; font-weight: 600; color: #0066ff; }
    .stat-label { font-size: 0.85em; color: #999; transition: color 0.3s; }
    body.dark .stat-label { color: #aaa; }
    .chart-controls { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      flex-wrap: wrap; 
      gap: 15px; 
      margin-bottom: 15px; 
      padding: 15px; 
      background: #f8f9fa; 
      border-radius: 8px; 
      transition: background 0.3s;
    }
    body.dark .chart-controls { background: #252525; }
    .control-group { display: flex; align-items: center; gap: 10px; }
    .control-group label { color: #666; font-size: 0.85em; font-weight: 500; white-space: nowrap; transition: color 0.3s; }
    body.dark .control-group label { color: #999; }
    .time-filters { display: flex; gap: 5px; }
    .time-btn { 
      padding: 6px 12px; 
      border: none; 
      background: white; 
      color: #666; 
      font-size: 0.85em; 
      font-weight: 500; 
      cursor: pointer; 
      border-radius: 4px; 
      transition: all 0.2s;
    }
    body.dark .time-btn { background: #3d3d3d; color: #aaa; }
    .time-btn:hover { background: #e9ecef; }
    body.dark .time-btn:hover { background: #4d4d4d; }
    .time-btn.active { background: #0066ff; color: white; }
    .date-inputs { display: flex; align-items: center; gap: 8px; }
    .date-inputs input { 
      padding: 4px 8px; 
      border: 1px solid #ddd; 
      border-radius: 4px; 
      font-size: 0.85em; 
      background: white; 
      transition: all 0.3s;
    }
    body.dark .date-inputs input { background: #3d3d3d; border-color: #555; color: #e0e0e0; }
    .date-inputs input:disabled { background: #f5f5f5; cursor: not-allowed; }
    body.dark .date-inputs input:disabled { background: #2a2a2a; }
    .btn-clear { 
      padding: 4px 10px; 
      background: #e9ecef; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.85em; 
      color: #666; 
      transition: all 0.3s;
    }
    body.dark .btn-clear { background: #3d3d3d; color: #aaa; }
    .btn-clear:hover { background: #dee2e6; }
    body.dark .btn-clear:hover { background: #4d4d4d; }
    .btn-refresh { 
      padding: 6px 12px; 
      background: #0066ff; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.85em; 
      font-weight: 500; 
    }
    .btn-refresh:hover { background: #0052cc; }
    .summary-panel { 
      margin-top: 10px; 
      padding: 12px; 
      background: #f0f9ff; 
      border-left: 4px solid #0066ff; 
      border-radius: 4px; 
      transition: background 0.3s;
    }
    body.dark .summary-panel { background: #1a2a3a; }
    .summary-stat-label { font-size: 0.75em; color: #666; transition: color 0.3s; }
    body.dark .summary-stat-label { color: #999; }
    .summary-stat-value { font-size: 1em; font-weight: 600; color: #1a1a1a; transition: color 0.3s; }
    body.dark .summary-stat-value { color: #e0e0e0; }
    .chart-legend { 
      display: flex; 
      gap: 20px; 
      justify-content: center; 
      margin-top: 15px; 
      padding-top: 15px; 
      border-top: 1px solid #e9ecef; 
      font-size: 0.85em; 
      transition: border-color 0.3s;
    }
    body.dark .chart-legend { border-top-color: #444; }
    .time-btn { padding: 6px 12px; border: none; background: white; color: #666; font-size: 0.85em; font-weight: 500; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
    .time-btn:hover { background: #e9ecef; }
    .time-btn.active { background: #0066ff; color: white; }
    .date-inputs { display: flex; align-items: center; gap: 8px; }
    .date-inputs input { padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.85em; }
    .date-inputs input:disabled { background: #f5f5f5; cursor: not-allowed; }
    .btn-clear { padding: 4px 10px; background: #e9ecef; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; color: #666; }
    .btn-clear:hover { background: #dee2e6; }
    .btn-refresh { padding: 6px 12px; background: #0066ff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-weight: 500; }
    .btn-refresh:hover { background: #0052cc; }
    .chart-wrapper { position: relative; height: 400px; cursor: crosshair; }
    .selection-box { position: absolute; border: 2px dashed #0066ff; background: rgba(0, 102, 255, 0.1); pointer-events: none; z-index: 10; }
    .selection-tooltip { position: absolute; background: rgba(0, 0, 0, 0.9); color: white; padding: 10px 15px; border-radius: 6px; font-size: 0.85em; pointer-events: none; z-index: 11; white-space: nowrap; }
    .selection-tooltip-label { color: #aaa; font-size: 0.75em; }
    .selection-tooltip-value { color: white; font-weight: 600; }
    .summary-panel { margin-top: 10px; padding: 12px; background: #f0f9ff; border-left: 4px solid #0066ff; border-radius: 4px; }
    .summary-panel h4 { color: #0066ff; margin-bottom: 8px; font-size: 0.9em; }
    .summary-stats { display: flex; gap: 15px; flex-wrap: wrap; }
    .summary-stat { display: flex; flex-direction: column; }
    .summary-stat-label { font-size: 0.75em; color: #666; }
    .summary-stat-value { font-size: 1em; font-weight: 600; color: #1a1a1a; }
    .chart-legend { display: flex; gap: 20px; justify-content: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e9ecef; font-size: 0.85em; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .no-data { text-align: center; padding: 40px; color: #999; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>📊 Monitor Multi-Equipo - TM</h1>
        <div class="subtitle">Ciclos 6am-6am • Filtros desde ahora hacia atrás</div>
      </div>
      <div class="header-controls">
        <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
        <div class="machine-selector">
          <label>Máquinas:</label>
          <select id="machineSelector" onchange="changeMachineType()">
            <option value="armadoras">Armadoras</option>
            <option value="expansoras">Expansoras</option>
            <option value="boquilladoras">Boquilladoras (61-67)</option>
            <option value="engrafadoras">Engrafadoras (41-48)</option>
            <option value="tester">Tester Estanqueidad (71-81)</option>
            <option value="inyectora_km4000">Inyectora KM4000 (#92)</option>
            <option value="inyectora_cosmos">Inyectora Cosmos 1500 (#91)</option>
            <option value="balancines">Balancines (código GOL)</option>
          </select>
        </div>
      </div>
    </div>
    <div id="equipmentContainer"></div>
  </div>

  <script>
    const MACHINE_CONFIGS = {
      armadoras: {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVrHs_GXmZGUMaOBjo4zr6mtNbFpf45WZ916Bj6LktK0i1F1gofWV_dnZfjam7MAbhDoQap_nZryeO/pub?gid=0&single=true&output=csv',
        name: 'Armadoras',
        tco: 240,
        ordersUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTyP9OJFSP2WnhhxVT5QW_4Q7yJvEXbu8gZq0V6n5rupZKAzq6NJg_HLUcvAEjO82NoDGdRS7RlYfvp/pub?gid=0&single=true&output=csv'
      },
      expansoras: {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkBYlgzc71g76k03IhGUA29lNMKjJl1rgB9WwzXcxT4uHgvzsySXs5tAuQHqQKglMLFgao6u4enqPC/pub?gid=0&single=true&output=csv',
        name: 'Expansoras',
        tco: 35
        // ordersUrl: '' ← RELLENAR URL de órdenes de fabricación aquí
      },
      boquilladoras: {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRyXM96q2hm6rpG8lqZC6MyFOpWmrofOyUh2wHuSByLUODy1AW3gwmurN3l_L8OUjVNyKzZnf9PQAg6/pub?gid=0&single=true&output=csv',
        name: 'Boquilladoras',
        tco: 120,
        description: '7 equipos (61-67), #1 dedicada a calefacción'
        // ordersUrl: '' ← RELLENAR URL de órdenes de fabricación aquí
      },
      engrafadoras: {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTey6-OpEpD1e2CBoJgya6E2aUjlexIIwEnbTYsXT2yXjU-1VFDYcJYDcRCYgw6HEI3crJMNSShjI3g/pub?gid=0&single=true&output=csv',
        name: 'Engrafadoras',
        tco: 72,
        description: '8 equipos (41-48), #2 calefacción (1 pieza/golpe), resto (1 pieza cada 2 golpes)'
        // ordersUrl: '' ← RELLENAR URL de órdenes de fabricación aquí
      },
      tester: {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSILIiMU-mnFsNk5rDLgCr9f4I1tRuf85hyxjAYavD5yhp6OYNrAJhinh7z8gvvt490vk27DFqjGEPO/pub?gid=0&single=true&output=csv',
        name: 'Tester Estanqueidad',
        tco: 45,
        description: '11 equipos (71-81), códigos: TOK (OK), TNG (falla)',
        multipleCodes: ['TOK', 'TNG'] // Acepta ambos códigos
        // ordersUrl: '' ← RELLENAR URL de órdenes de fabricación aquí
      },
      inyectora_km4000: {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQB4WKu2lAwiBUY2-RBqF69LjB4US4V3tHS5-HFmPtTIMmX1Gy-tWx4wC5ER76Bz8n7pEQIzrvpEiYQ/pub?gid=0&single=true&output=csv',
        name: 'Inyectora KM4000',
        tco: 180,
        description: 'Equipo #92'
        // ordersUrl: '' ← RELLENAR URL de órdenes de fabricación aquí
      },
      inyectora_cosmos: {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQKIOPE8g77gFjoCKpJt8P-sBUvgv2Nb-AX4650AB8FOYo84TKMCM0hztArZJu6Ci2gKz7tysF8TneW/pub?gid=0&single=true&output=csv',
        name: 'Inyectora Cosmos 1500',
        tco: 210,
        description: 'Equipo #91'
        // ordersUrl: '' ← RELLENAR URL de órdenes de fabricación aquí
      },
      balancines: {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vToWFuhar0t6IouJWXKsQrNM7odX5io3O0EvKoax8T0L23HMpgWzTO3A__49IdxueKu7V97U4eV2It9/pub?gid=0&single=true&output=csv',
        name: 'Balancines',
        tco: null, // No tiene TCO
        description: 'Golpes cada 5 minutos (código GOL)',
        isGolMode: true // Modo especial: solo mostrar valores GOL reales
        // ordersUrl: '' ← RELLENAR URL de órdenes de fabricación aquí
      }
    };

    let currentMachineType = 'armadoras';
    const CONFIG = { 
      filterCode: 'TM', 
      updateInterval: 10000,
      gapMaximo: 7.5 * 60 * 60 * 1000 // 7.5 horas en milisegundos
    };
    let equipmentData = {}, charts = {}, lastDataHash = '';
    let equipmentSettings = {}; // Configuración individual por equipo
    let dragSelectInitialized = {}; // Evitar event listeners duplicados
    let fabricationOrders = {}; // Órdenes de fabricación por equipo
    let showOrderTooltips = true; // Toggle para mostrar/ocultar tooltips de OF
    
    // Mapeo de equipos a nombres reales por tipo de máquina
    const EQUIPMENT_NAMES = {
      armadoras: {
        // Dejar vacío para usar índices dinámicos (Armadora 1, 2, 3...)
        // O agregar mapeos personalizados:
        // '221': 'Armadora Custom',
      },
      expansoras: {
        // Agregar mapeo de expansoras si es necesario
      },
      boquilladoras: {
        // Agregar mapeo de boquilladoras si es necesario
      },
      engrafadoras: {
        // Agregar mapeo de engrafadoras si es necesario
      },
      tester: {
        // Agregar mapeo de testers si es necesario
      },
      inyectora_km4000: {
        '92': 'Inyectora KM4000'
      },
      inyectora_cosmos: {
        '91': 'Inyectora Cosmos 1500'
      },
      balancines: {
        // Agregar mapeo de balancines si es necesario
      }
    };
    
    // Función para obtener el nombre formateado del equipo
    function getEquipmentName(eq) {
      const config = MACHINE_CONFIGS[currentMachineType];
      const settings = equipmentSettings[eq];
      const mappings = EQUIPMENT_NAMES[currentMachineType] || {};
      const customName = mappings[eq];
      
      // Para máquinas únicas (inyectoras, etc.), no agregar número
      const uniqueMachines = ['inyectora_km4000', 'inyectora_cosmos'];
      
      if (uniqueMachines.includes(currentMachineType)) {
        // Máquinas únicas: usar nombre del config sin índice
        return customName ? `${customName} (Eq ${eq})` : `${config.name} (Eq ${eq})`;
      }
      
      // Máquinas múltiples:
      if (customName) {
        // Si hay nombre personalizado en el mapeo, usarlo
        return `${customName} (Eq ${eq})`;
      } else {
        // Si NO hay mapeo, usar índice dinámico
        const index = settings?.index || 1;
        const baseName = config.name.endsWith('s') ? config.name.slice(0, -1) : config.name;
        return `${baseName} ${index} (Eq ${eq})`;
      }
    }

    // Convertir fecha a día laboral (6am-6am)
    function toWorkDay(date) {
      const d = new Date(date);
      if (d.getHours() < 6) {
        // Si es antes de las 6am, pertenece al día laboral anterior
        d.setDate(d.getDate() - 1);
      }
      d.setHours(6, 0, 0, 0);
      return d;
    }

    // Obtener inicio y fin de día laboral
    function getWorkDayBounds(date) {
      const start = toWorkDay(date);
      const end = new Date(start.getTime() + (24 * 60 * 60 * 1000)); // +24 horas
      return { start, end };
    }

    // ========== TEMA OSCURO ==========
    function toggleTheme() {
      document.body.classList.toggle('dark');
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
      
      // Actualizar grids de todos los gráficos
      Object.keys(charts).forEach(eq => {
        if (charts[eq]) {
          const isDark = document.body.classList.contains('dark');
          const gridColor = isDark ? 'rgba(200, 200, 200, 0.15)' : 'rgba(0, 0, 0, 0.05)';
          charts[eq].options.scales.x.grid.color = gridColor;
          charts[eq].options.scales.y.grid.color = gridColor;
          charts[eq].update('none');
        }
      });
    }

    function toggleOrderTooltips() {
      showOrderTooltips = !showOrderTooltips;
      
      // Actualizar todos los botones de tooltips
      Object.keys(equipmentSettings).forEach(eq => {
        const btn = document.getElementById(`orderTooltipsBtn-${eq}`);
        if (btn) {
          btn.style.opacity = showOrderTooltips ? '1' : '0.5';
          btn.title = showOrderTooltips ? 'Ocultar tooltips de órdenes' : 'Mostrar tooltips de órdenes';
        }
      });
      
      // Re-renderizar todos los gráficos para actualizar tooltips
      Object.keys(charts).forEach(eq => {
        if (charts[eq]) {
          charts[eq].update('none');
        }
      });
    }

    // Cargar tema guardado
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      setTimeout(() => {
        const btn = document.querySelector('.theme-toggle');
        if (btn) btn.textContent = '☀️';
      }, 100);
    }

    // ========== CAMBIO DE TIPO DE MÁQUINA ==========
    function changeMachineType() {
      const newType = document.getElementById('machineSelector').value;
      if (newType !== currentMachineType) {
        currentMachineType = newType;
        equipmentData = {};
        lastDataHash = '';
        fabricationOrders = {}; // Limpiar órdenes
        Object.keys(charts).forEach(eq => charts[eq]?.destroy());
        charts = {};
        equipmentSettings = {};
        dragSelectInitialized = {}; // Limpiar tracking de event listeners
        document.getElementById('equipmentContainer').innerHTML = '<div class="no-data">Cargando...</div>';
        loadData();
      }
    }

    async function loadData() {
      try {
        const config = MACHINE_CONFIGS[currentMachineType];
        
        // Cargar datos de producción
        const r = await fetch(config.csvUrl);
        if (!r.ok) throw new Error(`HTTP:${r.status}`);
        processData(await r.text());
        
        // Cargar órdenes de fabricación si existen
        if (config.ordersUrl) {
          try {
            const ordersResponse = await fetch(config.ordersUrl);
            if (ordersResponse.ok) {
              processOrders(await ordersResponse.text());
            }
          } catch (e) {
            console.warn('⚠️ No se pudieron cargar órdenes:', e.message);
          }
        }
        
        return true;
      } catch (e) {
        console.error('❌ Error en loadData:', e);
        document.getElementById('equipmentContainer').innerHTML = `<div class="no-data">❌ Error: ${e.message}</div>`;
        return false;
      }
    }
    
    // Parsear la columna "Maquina" del CSV de órdenes
    // Formatos soportados:
    // "1" = solo máquina 1
    // "1-3" = máquinas 1 y 3
    // "1_3" = máquinas 1, 2 y 3 (rango)
    function parseMachineColumn(machineStr) {
      if (!machineStr || machineStr.trim() === '') return [];
      
      const machines = [];
      const parts = machineStr.trim().split('-');
      
      for (const part of parts) {
        if (part.includes('_')) {
          // Formato rango: 1_3 = máquinas 1, 2, 3
          const [start, end] = part.split('_').map(n => parseInt(n.trim()));
          if (!isNaN(start) && !isNaN(end)) {
            for (let i = Math.min(start, end); i <= Math.max(start, end); i++) {
              machines.push(i.toString());
            }
          }
        } else {
          // Formato simple: solo un número
          const num = parseInt(part.trim());
          if (!isNaN(num)) {
            machines.push(num.toString());
          }
        }
      }
      
      return machines;
    }

    function processOrders(csv) {
      const lines = csv.split('\n');
      const orders = [];
      
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        
        const parts = line.split(',');
        if (parts.length < 6) continue;
        
        const orderNum = parts[0]?.trim();
        const model = parts[1]?.trim();
        const quantity = parseInt(parts[2]?.trim()) || 0;
        const tco = parseInt(parts[3]?.trim()) || 0;
        const date = parts[4]?.trim();
        const time = parts[5]?.trim();
        const machineColumn = parts[6]?.trim() || ''; // Nueva columna Maquina
        
        const datetime = parseDateTime(date, time);
        if (datetime && orderNum) {
          // Parsear columna de máquinas
          const machines = parseMachineColumn(machineColumn);
          
          orders.push({
            orderNum,
            model,
            quantity,
            tco,
            datetime,
            startTime: datetime.getTime(),
            machines // Array de equipos que aplican a esta orden
          });
        }
      }
      
      // Ordenar por fecha
      orders.sort((a, b) => a.startTime - b.startTime);
      
      // Calcular endTime para cada orden por máquina
      // Cada máquina tiene su propia secuencia de órdenes
      const ordersByMachine = {};
      
      orders.forEach(order => {
        if (order.machines.length === 0) {
          // Si no especifica máquinas, aplica a TODAS
          order.machines = ['ALL'];
        }
        
        order.machines.forEach(machine => {
          if (!ordersByMachine[machine]) {
            ordersByMachine[machine] = [];
          }
          ordersByMachine[machine].push({...order, machine});
        });
      });
      
      // Calcular endTime por máquina
      const now = Date.now();
      Object.keys(ordersByMachine).forEach(machine => {
        const machineOrders = ordersByMachine[machine];
        machineOrders.sort((a, b) => a.startTime - b.startTime);
        
        for (let i = 0; i < machineOrders.length; i++) {
          if (i < machineOrders.length - 1) {
            machineOrders[i].endTime = machineOrders[i + 1].startTime;
          } else {
            machineOrders[i].endTime = now; // La última orden llega hasta ahora
          }
        }
      });
      
      fabricationOrders = ordersByMachine;
      
      const totalOrders = Object.values(ordersByMachine).reduce((sum, arr) => sum + arr.length, 0);
      console.log(`📋 ${totalOrders} órdenes cargadas para ${Object.keys(ordersByMachine).length} equipos`);
      
      // Si ya hay datos de equipos cargados, re-renderizar para mostrar las órdenes
      if (Object.keys(equipmentData).length > 0) {
        renderEquipmentCharts();
      }
    }
    
    // Calcular estadísticas de producción para una orden
    function calculateOrderStats(order, equipmentDataArray) {
      const orderData = equipmentDataArray.filter(d => 
        d.datetime.getTime() >= order.startTime && 
        d.datetime.getTime() < order.endTime
      );
      
      const unitsProduced = orderData.length;
      const avgTCO = orderData.length > 0
        ? Math.round(orderData.reduce((sum, d) => sum + d.value, 0) / orderData.length)
        : 0;
      
      return { unitsProduced, avgTCO };
    }
    
    // Obtener TCO activo para un timestamp y equipo específico (de la orden si existe, sino del config)
    function getTCOForTimestamp(timestamp, equipment) {
      const specificOrders = fabricationOrders[equipment] || [];
      const allOrders = fabricationOrders['ALL'] || [];
      const equipmentOrders = [...specificOrders, ...allOrders];
      
      if (equipmentOrders.length === 0) {
        return MACHINE_CONFIGS[currentMachineType].tco;
      }
      
      // Buscar la orden activa en ese timestamp
      const activeOrder = equipmentOrders.find(order => 
        timestamp >= order.startTime && timestamp < order.endTime
      );
      
      return activeOrder ? activeOrder.tco : MACHINE_CONFIGS[currentMachineType].tco;
    }

    function processData(csv) {
      const lines = csv.split('\n'), dataByEq = {}, seen = {};
      const config = MACHINE_CONFIGS[currentMachineType];
      
      // Determinar códigos a filtrar
      let acceptedCodes = [];
      if (config.isGolMode) {
        acceptedCodes = ['GOL'];
      } else if (config.multipleCodes) {
        acceptedCodes = config.multipleCodes; // ['TOK', 'TNG']
      } else {
        acceptedCodes = [CONFIG.filterCode]; // ['TM']
      }
      
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const c = line.split(',');
        if (c.length < 8) continue;
        const eq = c[2]?.trim(), cod = c[6]?.trim(), date = c[4]?.trim(), time = c[5]?.trim();
        let val = parseInt(c[7]?.trim()) || 0;
        
        // Verificar si el código está en la lista de códigos aceptados
        if (acceptedCodes.includes(cod) && eq) {
          if (!dataByEq[eq]) {
            dataByEq[eq] = [];
            seen[eq] = new Set();
          }
          const key = `${date}-${time}`;
          if (!seen[eq].has(key)) {
            seen[eq].add(key);
            const dt = parseDateTime(date, time);
            if (dt) dataByEq[eq].push({ datetime: dt, value: val, code: cod });
          }
        }
      }
      for (let eq in dataByEq) dataByEq[eq].sort((a, b) => a.datetime - b.datetime);
      
      // PURGA: Calcular límite de antigüedad dinámicamente
      // Por defecto 90 días, pero se ajusta si el usuario selecciona fechas más antiguas
      let maxDaysBack = 90; // Default: 90 días
      
      // Verificar si algún equipo tiene fecha "desde" seleccionada
      Object.values(equipmentSettings).forEach(settings => {
        if (settings.dateFrom) {
          const daysFromNow = Math.ceil((Date.now() - settings.dateFrom.getTime()) / (24 * 60 * 60 * 1000));
          if (daysFromNow > maxDaysBack) {
            maxDaysBack = daysFromNow + 7; // Agregar 7 días de buffer
          }
        }
      });
      
      const maxDaysAgo = new Date(Date.now() - (maxDaysBack * 24 * 60 * 60 * 1000));
      
      for (let eq in dataByEq) {
        const originalCount = dataByEq[eq].length;
        dataByEq[eq] = dataByEq[eq].filter(d => d.datetime >= maxDaysAgo);
        const purgedCount = originalCount - dataByEq[eq].length;
        if (purgedCount > 0) {
          console.log(`📦 Purga equipo ${eq}: ${purgedCount} registros antiguos eliminados (${dataByEq[eq].length} restantes) - límite: ${maxDaysBack} días`);
        }
      }
      
      const newHash = generateDataHash(dataByEq);
      if (newHash !== lastDataHash) {
        equipmentData = dataByEq;
        lastDataHash = newHash;
        renderEquipmentCharts();
        
        // Log de estadísticas para monitoreo de memoria
        const totalPoints = Object.values(equipmentData).reduce((sum, arr) => sum + arr.length, 0);
        const equipmentCount = Object.keys(equipmentData).length;
        console.log(`📊 Stats: ${equipmentCount} equipos, ${totalPoints.toLocaleString()} puntos totales en memoria`);
      }
    }

    function parseDateTime(d, t) {
      try {
        const dp = d.split('/');
        let day = parseInt(dp[0]), mon = parseInt(dp[1]), year = parseInt(dp[2]);
        if (year < 100) year = year < 50 ? 2000 + year : 1900 + year;
        const tp = t.split(':'), h = parseInt(tp[0]) || 0, m = parseInt(tp[1]) || 0, s = parseInt(tp[2]) || 0;
        return new Date(year, mon - 1, day, h, m, s);
      } catch { return null; }
    }

    function generateDataHash(data) {
      const keys = Object.keys(data).sort();
      let h = '';
      keys.forEach(e => {
        const d = data[e];
        if (d.length > 0) {
          const l = d[d.length - 1];
          h += `${e}-${d.length}-${l.datetime.getTime()}-${l.value}|`;
        }
      });
      return h;
    }

      // FILTRO BACKEND: Solo equipos con datos (showEmpty = false por defecto)

        ? allEqs 
        : allEqs.filter(eq => equipmentData[eq] && equipmentData[eq].length > 0);
      
      // Mapear equipos a índices (para nombres como "Armadora 1, 2, 3...")
      const equipmentIndex = {};
      let counter = 1;
      eqs.forEach(eq => {
        equipmentIndex[eq] = counter++;
      });
      
      eqs.forEach(eq => {

            filter: 1440,
            pointSize: 4,
            dateFrom: null,
            dateTo: null,
            selection: null,
            zoomStart: null,
            zoomEnd: null,
            index: equipmentIndex[eq] // Guardar índice para usar en nombres

        }
        
        updateEquipmentChart(eq);
      });
    }

    function updateEquipmentChart(eq) {
      const settings = equipmentSettings[eq];
      let data = equipmentData[eq] || [];
      
      // Filtrar por tiempo o fechas
      if (settings.dateFrom || settings.dateTo) {
        data = data.filter(d => {
          if (settings.dateFrom && settings.dateTo) {
            return d.datetime >= settings.dateFrom && d.datetime <= settings.dateTo;
          } else if (settings.dateFrom) {
            return d.datetime >= settings.dateFrom;
          } else if (settings.dateTo) {
            return d.datetime <= settings.dateTo;
          }
          return true;
        });
      } else if (settings.filter && !settings.zoomStart) {
        // Filtro de hora: desde AHORA hacia atrás
        const now = new Date();
        const cutoff = new Date(now.getTime() - (settings.filter * 60 * 1000));
        data = data.filter(d => d.datetime >= cutoff && d.datetime <= now);
      }
      
      if (data.length === 0) return;
      
      const config = MACHINE_CONFIGS[currentMachineType];
      const isGolMode = config.isGolMode || false;
      const tco = config.tco;
      
      // MODO ESPECIAL: Balancines (GOL) - Solo mostrar valores reales sin procesamiento
      if (isGolMode) {
        const complete = data.map(d => ({
          x: d.datetime.getTime(),
          y: d.value,
          isProjected: false,
          isHollow: false
        }));
        
        // Calcular promedio
        const avgVal = data.length > 0 ? Math.round(data.reduce((s, d) => s + d.value, 0) / data.length) : 0;
        
        renderGolChart(eq, complete, avgVal, settings);
        return;
      }
      
      // MODO NORMAL: Con TCO
      // Usar TCO del config como fallback, pero será dinámico por orden
      const baseTCO = tco;
      const baseMaxAllowed = tco * 4;
      
      // Calcular avgInt inicial (se actualizará dinámicamente en el loop)
      const baseAvgInt = tco * 1000;
      const validForAvg = data.filter(d => d.value <= baseMaxAllowed);
      const avgVal = validForAvg.length > 0 ? Math.round(validForAvg.reduce((s, d) => s + d.value, 0) / validForAvg.length) : tco;
      const complete = [];
      const verticalLines = []; // Para marcar períodos largos
      let lastRealTime = null;
      const gapMaximo = CONFIG.gapMaximo; // 7.5 horas
      
      for (let i = 0; i < data.length; i++) {
        const cur = data[i];
        
        // TCO DINÁMICO: Obtener TCO de la orden activa en este timestamp
        const currentTCO = getTCOForTimestamp(cur.datetime.getTime(), eq);
        const maxAllowed = currentTCO * 4;
        const avgInt = currentTCO * 1000;
        
        const isOverLimit = cur.value > maxAllowed;
        
        if (lastRealTime) {
          const gap = cur.datetime - lastRealTime;
          
          // TCO para el gap (usar TCO del último punto)
          const gapTCO = getTCOForTimestamp(lastRealTime.getTime());
          const gapAvgInt = gapTCO * 1000;
          
          // Detectar período largo (>7.5 horas)
          if (gap > gapMaximo) {
            // Marcar el último punto antes del período largo
            verticalLines.push({
              x: lastRealTime.getTime(),
              label: 'Fin período'
            });
            
            // Marcar el primer punto después del período largo
            verticalLines.push({
              x: cur.datetime.getTime(),
              label: 'Inicio período'
            });
            
            // El primer punto después de gap largo debe estar en tiempo estándar
            if (isOverLimit) {
              // Remover amarillos anteriores coincidentes
              const tolerance = (currentTCO / 2) * 1000;
              const coincidentIndices = [];
              
              for (let idx = complete.length - 1; idx >= 0; idx--) {
                const p = complete[idx];
                if (p.isProjected && !p.isHollow && 
                    p.x < cur.datetime.getTime() && 
                    Math.abs(p.x - cur.datetime.getTime()) <= tolerance) {
                  coincidentIndices.push(idx);
                }
              }
              
              for (const idx of coincidentIndices) {
                complete.splice(idx, 1);
              }
              
              complete.push({ x: cur.datetime.getTime(), y: currentTCO, isProjected: false, isHollow: true, realValue: cur.value });
            } else {
              // Punto normal, ajustar a tiempo estándar (TCO antes del punto real)
              const adjustedTime = new Date(cur.datetime.getTime() - avgInt);
              complete.push({ x: adjustedTime.getTime(), y: cur.value, isProjected: false, isHollow: false });
            }
          } else if (gap > gapAvgInt * 3) {
            // Gap normal (>3×TCO pero <gapMaximo)
            let pt = new Date(lastRealTime.getTime() + gapAvgInt);
            const targetTime = cur.datetime;
            
            // SEGURIDAD: Limitar a máximo 10000 puntos amarillos por gap
            let safetyCounter = 0;
            const MAX_YELLOW_POINTS = 10000;
            
            while (pt < targetTime && safetyCounter < MAX_YELLOW_POINTS) {
              // Usar TCO de la orden activa en cada punto amarillo
              const yellowTCO = getTCOForTimestamp(pt.getTime(), eq);
              complete.push({ x: pt.getTime(), y: yellowTCO, isProjected: true, isHollow: false });
              
              // Incrementar usando el TCO del siguiente punto
              const nextYellowTCO = getTCOForTimestamp(pt.getTime() + 1000, eq); // +1 segundo
              pt = new Date(pt.getTime() + (nextYellowTCO * 1000));
              safetyCounter++;
            }
            
            if (safetyCounter >= MAX_YELLOW_POINTS) {
              console.warn(`⚠️ Límite de seguridad alcanzado: ${MAX_YELLOW_POINTS} puntos amarillos generados para gap de ${Math.round(gap / 1000 / 60)} minutos`);
            }
            
            if (isOverLimit) {
              const tolerance = (currentTCO / 2) * 1000;
              const coincidentIndices = [];
              
              for (let idx = complete.length - 1; idx >= 0; idx--) {
                const p = complete[idx];
                if (p.isProjected && !p.isHollow && 
                    p.x < cur.datetime.getTime() && 
                    Math.abs(p.x - cur.datetime.getTime()) <= tolerance) {
                  coincidentIndices.push(idx);
                }
              }
              
              for (const idx of coincidentIndices) {
                complete.splice(idx, 1);
              }
              
              complete.push({ x: cur.datetime.getTime(), y: currentTCO, isProjected: false, isHollow: true, realValue: cur.value });
            } else {
              const adjustedTime = new Date(pt.getTime() - gapAvgInt + gapAvgInt);
              complete.push({ x: adjustedTime.getTime(), y: cur.value, isProjected: false, isHollow: false });
            }
          } else if (isOverLimit) {
            // Punto sobre límite sin gap previo
            const tolerance = (currentTCO / 2) * 1000;
            const coincidentIndices = [];
            
            for (let idx = complete.length - 1; idx >= 0; idx--) {
              const p = complete[idx];
              if (p.isProjected && !p.isHollow && 
                  p.x < cur.datetime.getTime() && 
                  Math.abs(p.x - cur.datetime.getTime()) <= tolerance) {
                coincidentIndices.push(idx);
              }
            }
            
            for (const idx of coincidentIndices) {
              complete.splice(idx, 1);
            }
            
            complete.push({ x: cur.datetime.getTime(), y: currentTCO, isProjected: false, isHollow: true, realValue: cur.value });
          } else {
            // Sin gap ni sobre límite
            complete.push({ x: cur.datetime.getTime(), y: cur.value, isProjected: false, isHollow: false });
          }
        } else {
          // Primer punto
          if (isOverLimit) {
            complete.push({ x: cur.datetime.getTime(), y: currentTCO, isProjected: false, isHollow: true, realValue: cur.value });
          } else {
            complete.push({ x: cur.datetime.getTime(), y: cur.value, isProjected: false, isHollow: false });
          }
        }
        
        // Actualizar lastRealTime - SIEMPRE, incluyendo puntos lentos
        lastRealTime = cur.datetime;
      }
      
      // Propagar códigos (TOK/TNG) desde data a complete
      // Crear un map de timestamps a códigos
      const codeMap = new Map();
      data.forEach(d => {
        if (d.code) {
          codeMap.set(d.datetime.getTime(), d.code);
        }
      });
      
      // Asignar códigos a puntos en complete
      complete.forEach(point => {
        if (!point.isProjected && codeMap.has(point.x)) {
          point.code = codeMap.get(point.x);
        }
      });
      
      // Proyecciones hasta ahora
      const now = new Date(), since = now - lastRealTime;
      // TCO del último punto para calcular si hay gap
      const lastTCO = getTCOForTimestamp(lastRealTime ? lastRealTime.getTime() : now.getTime(), eq);
      const lastAvgInt = lastTCO * 1000;
      
      if (since > lastAvgInt * 3) {
        let pt = new Date(lastRealTime.getTime() + lastAvgInt);
        
        // SEGURIDAD: Limitar proyecciones
        let safetyCounter = 0;
        const MAX_PROJECTIONS = 5000;
        
        while (pt <= now && safetyCounter < MAX_PROJECTIONS) {
          // Usar TCO de la orden activa en cada proyección
          const projTCO = getTCOForTimestamp(pt.getTime(), eq);
          complete.push({ x: pt.getTime(), y: projTCO, isProjected: true, isHollow: false });
          
          // Incrementar usando el TCO de la siguiente proyección
          const nextProjTCO = getTCOForTimestamp(pt.getTime() + 1000, eq); // +1 segundo para ver siguiente orden
          pt = new Date(pt.getTime() + (nextProjTCO * 1000));
          safetyCounter++;
        }
        
        if (safetyCounter >= MAX_PROJECTIONS) {
          console.warn(`⚠️ Límite de proyecciones alcanzado: ${MAX_PROJECTIONS} puntos`);
        }
      }
      
      // Si hay gap entre último proceso y ahora, agregar línea vertical
      if (lastRealTime && (now - lastRealTime) > gapMaximo) {
        // Encontrar el último punto azul
        for (let i = complete.length - 1; i >= 0; i--) {
          if (!complete[i].isProjected) {
            verticalLines.push({ x: complete[i].x, isStart: false });
            break;
          }
        }
      }
      
      // Contar puntos válidos (azules sólidos) Y puntos lentos (círculos huecos) para estadísticas
      const producedPieces = complete.filter(d => !d.isProjected); // Sólidos y huecos
      
      // Las estadísticas se actualizarán después de crear/actualizar el chart
      
      const colors = complete.map(d => {
        // TNG (falla) = rojo
        if (d.code === 'TNG') return '#ef4444';
        // Círculos huecos = transparente
        if (d.isHollow) return 'rgba(0, 102, 255, 0)';
        // Amarillos = proyectados
        if (d.isProjected) return '#fbbf24';
        // TOK o normal = azul
        return '#0066ff';
      });
      
      const borderColors = complete.map(d => {
        // TNG (falla) = rojo
        if (d.code === 'TNG') return '#ef4444';
        // Círculos huecos = borde azul
        if (d.isHollow) return '#0066ff';
        // Amarillos = amarillo
        if (d.isProjected) return '#fbbf24';
        // TOK o normal = azul
        return '#0066ff';
      });
      
      const borderWidths = complete.map(d => d.isHollow ? 2 : 0);
      
      // Divisiones de tiempo
      let timeUnit = 'hour', timeStep = 1;
      if (settings.filter === 60) { timeUnit = 'minute'; timeStep = 5; }
      else if (settings.filter === 360) { timeUnit = 'minute'; timeStep = 15; }
      else if (settings.filter === 720) { timeUnit = 'minute'; timeStep = 30; }
      else if (settings.filter === 1440) { timeUnit = 'hour'; timeStep = 1; }
      else if (settings.filter === 10080) { timeUnit = 'day'; timeStep = 1; }
      
      // Límites
      let minTime, maxTime;
      if (settings.zoomStart && settings.zoomEnd) {
        // Si hay zoom activo, usar esos límites
        minTime = new Date(settings.zoomStart);
        maxTime = new Date(settings.zoomEnd);
      } else if (settings.dateFrom || settings.dateTo) {
        minTime = settings.dateFrom || new Date(settings.dateTo.getTime() - (30 * 24 * 60 * 60 * 1000));
        maxTime = settings.dateTo || new Date(settings.dateFrom.getTime() + (30 * 24 * 60 * 60 * 1000));
      } else {
        minTime = new Date(now.getTime() - (settings.filter * 60 * 1000));
        maxTime = now;
      }
      
      const ctx = document.getElementById(`chart-${eq}`).getContext('2d');
      
      // Configurar anotaciones para líneas verticales y línea TCO
      const annotations = {};
      
      // Filtrar órdenes de fabricación para este equipo específico
      // Combinar órdenes del equipo + órdenes 'ALL' (que aplican a todos)
      const specificOrders = fabricationOrders[eq] || [];
      const allOrders = fabricationOrders['ALL'] || [];
      const equipmentOrders = [...specificOrders, ...allOrders];
      
      // Agregar líneas TCO dinámicas y marcadores de órdenes de fabricación
      if (equipmentOrders.length > 0) {
        equipmentOrders.forEach((order, idx) => {
          // Línea vertical roja al inicio de la orden
          annotations[`orderStart${idx}`] = {
            type: 'line',
            xMin: order.startTime,
            xMax: order.startTime,
            borderColor: '#ef4444',
            borderWidth: 3,
            label: {
              content: `Orden ${order.orderNum}`,
              enabled: true,
              position: 'start',
              yAdjust: -10,
              backgroundColor: 'rgba(239, 68, 68, 0.9)',
              color: '#fff',
              font: { size: 11, weight: 'bold' }
            }
          };
          
          // Línea TCO horizontal de la orden (desde inicio hasta fin de orden)
          annotations[`orderTCO${idx}`] = {
            type: 'line',
            xMin: order.startTime,
            xMax: order.endTime,
            yMin: order.tco,
            yMax: order.tco,
            borderColor: '#3b82f6',
            borderWidth: 2,
            borderDash: [10, 5],
            label: {
              content: `TCO: ${order.tco}s`,
              enabled: true,
              position: 'center',
              backgroundColor: 'rgba(59, 130, 246, 0.8)',
              color: '#fff',
              font: { size: 10 }
            }
          };
          
          // Tooltip con información de la orden (box a la izquierda de la línea)
          annotations[`orderInfo${idx}`] = {
            type: 'label',
            xValue: order.startTime,
            yValue: (ctx) => {
              const yScale = ctx.chart.scales.y;
              return yScale.max * 0.85; // 85% de la altura
            },
            xAdjust: -140,
            display: (ctx) => showOrderTooltips, // Toggle para mostrar/ocultar
            content: (ctx) => {
              // Calcular producción real para esta orden
              const allData = ctx.chart.data.datasets[0].data || [];
              const orderPoints = allData.filter(d => 
                !d.isProjected && d.x >= order.startTime && d.x < order.endTime
              );
              const unitsProduced = orderPoints.length;
              const avgTCO = orderPoints.length > 0
                ? Math.round(orderPoints.reduce((sum, d) => sum + (d.realValue || d.y), 0) / orderPoints.length)
                : 0;
              
              const startDate = new Date(order.startTime);
              const startDateStr = startDate.toLocaleDateString('es-AR', {day: '2-digit', month: '2-digit'});
              const startTimeStr = startDate.toLocaleTimeString('es-AR', {hour: '2-digit', minute: '2-digit', hour12: false});
              
              return [
                `Orden ${order.orderNum}`,
                `Modelo: ${order.model}`,
                `Inicio: ${startDateStr} ${startTimeStr}`,
                `Unidades: ${unitsProduced} de ${order.quantity}`,
                `TCO: ${order.tco}s (orden) / ${avgTCO}s (real)`
              ];
            },
            backgroundColor: 'rgba(0, 0, 0, 0.9)',
            color: '#fff',
            font: { size: 10, family: 'monospace' },
            padding: 10,
            borderRadius: 6,
            textAlign: 'left'
          };
        });
      } else {
        // Si no hay órdenes, usar TCO estático del config
        annotations.tcoLine = {
          type: 'line',
          yMin: tco,
          yMax: tco,
          borderColor: '#fbbf24',
          borderWidth: 1,
          borderDash: [5, 5],
          label: {
            content: `TCO: ${tco}s`,
            enabled: true,
            position: 'end',
            backgroundColor: 'rgba(251, 191, 36, 0.8)',
            color: '#000',
            font: { size: 10 }
          }
        };
      }
      
      verticalLines.forEach((line, idx) => {
        annotations[`vline${idx}`] = {
          type: 'line',
          xMin: line.x,
          xMax: line.x,
          yMin: (value) => value.chart.scales.y.min,
          yMax: (value) => {
            const yScale = value.chart.scales.y;
            const range = yScale.max - yScale.min;
            return yScale.min + (range * 0.2); // 20% de altura
          },
          borderColor: '#ff6b6b',
          borderWidth: 3,
          borderDash: [5, 5],
          label: {
            content: line.label,
            enabled: true,
            position: 'start',
            backgroundColor: 'rgba(255, 107, 107, 0.8)',
            color: 'white',
            font: { size: 10 }
          }
        };
      });
      
      if (charts[eq]) {
        charts[eq].data.datasets[0].data = complete;
        charts[eq].data.datasets[0].pointBackgroundColor = colors;
        charts[eq].data.datasets[0].pointBorderColor = borderColors;
        charts[eq].data.datasets[0].pointBorderWidth = borderWidths;
        charts[eq].options.scales.x.time.unit = timeUnit;
        charts[eq].options.scales.x.time.stepSize = timeStep;
        charts[eq].options.scales.x.min = minTime.getTime();
        charts[eq].options.scales.x.max = maxTime.getTime();
        charts[eq].options.plugins.annotation.annotations = annotations;
        charts[eq].update('none');
        updateVisibleStats(eq); // Actualizar stats después de update
      } else {
        charts[eq] = new Chart(ctx, {
          type: 'scatter',
          data: {
            datasets: [{
              data: complete,
              pointRadius: settings.pointSize,
              pointBackgroundColor: colors,
              pointBorderColor: borderColors,
              pointBorderWidth: borderWidths,
              showLine: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: {
              legend: { display: false },
              annotation: {
                annotations: annotations
              },
              tooltip: {
                enabled: true,
                backgroundColor: 'rgba(0,0,0,0.9)',
                padding: {
                  top: Math.max(15, window.innerHeight * 0.015),
                  bottom: Math.max(15, window.innerHeight * 0.015),
                  left: Math.max(20, window.innerWidth * 0.01),
                  right: Math.max(20, window.innerWidth * 0.01)
                },
                titleFont: { size: Math.max(16, window.innerHeight * 0.02), weight: 'bold' },
                bodyFont: { size: Math.max(18, window.innerHeight * 0.022) },
                displayColors: false,
                cornerRadius: 8,
                caretSize: 8,
                callbacks: {
                  title: i => new Date(i[0].parsed.x).toLocaleString('es-AR'),
                  label: c => {
                    const config = MACHINE_CONFIGS[currentMachineType];
                    const unit = config.useGolCode ? ' piezas' : ' seg';
                    const point = complete[c.dataIndex];
                    
                    // Validar que point existe
                    if (!point) {
                      return `Valor: ${c.parsed.y}${unit}`;
                    }
                    
                    // Mostrar código si es TOK o TNG
                    if (point.code === 'TOK') {
                      return `✅ Aprobado: ${c.parsed.y}${unit}`;
                    }
                    if (point.code === 'TNG') {
                      return `❌ Rechazado: ${c.parsed.y}${unit}`;
                    }
                    
                    if (point.isHollow) {
                      return `🔵 Proceso lento: ${point.realValue}${unit} (excede TCO)`;
                    }
                    const p = c.dataset.pointBackgroundColor[c.dataIndex] === '#fbbf24';
                    const label = config.useGolCode 
                      ? (p ? '⚠️ Perdida: ' : 'Piezas: ')
                      : (p ? '⚠️ Perdida: ' : 'Tiempo: ');
                    return label + c.parsed.y + unit;
                  }
                }
              }
            },
            scales: {
              x: {
                type: 'time',
                min: minTime.getTime(),
                max: maxTime.getTime(),
                time: {
                  unit: timeUnit,
                  stepSize: timeStep,
                  displayFormats: { 
                    hour: 'HH:mm', 
                    minute: 'HH:mm', 
                    day: 'dd/MM' 
                  }
                },
                grid: { 
                  color: 'rgba(0,0,0,0.05)',
                  drawOnChartArea: true
                },
                ticks: { 
                  color: '#666', 
                  maxRotation: 0, 
                  autoSkip: false,
                  font: { weight: 'bold' }
                },
                title: {
                  display: true,
                  text: 'Hora',
                  color: '#666',
                  font: { weight: 'bold', size: 14 }
                }
              },
              y: {
                beginAtZero: true,
                suggestedMax: function(context) {
                  const data = context.chart.data.datasets[0].data;
                  if (data && data.length > 0) {
                    const maxY = Math.max(...data.map(d => d.y || 0));
                    return maxY * 1.1; // 10% más
                  }
                  return undefined;
                },
                grid: { color: 'rgba(0,0,0,0.05)' },
                ticks: { 
                  color: '#666',
                  font: { weight: 'bold' }
                },
                title: {
                  display: true,
                  text: MACHINE_CONFIGS[currentMachineType].useGolCode ? 'Piezas' : 'Tiempo (seg)',
                  color: '#666',
                  font: { weight: 'bold', size: 14 }
                }
              }
            }
          },
          plugins: [{
            id: 'backgroundDates',
            beforeDraw: (chart) => {
              const ctx = chart.ctx;
              const xAxis = chart.scales.x;
              const yAxis = chart.scales.y;
              
              // Dibujar fechas en el fondo
              const minDate = new Date(xAxis.min);
              const maxDate = new Date(xAxis.max);
              const daysDiff = (maxDate - minDate) / (1000 * 60 * 60 * 24);
              
              if (daysDiff > 0.5) { // Solo si abarca más de medio día
                ctx.save();
                ctx.font = 'bold 48px Arial';
                const isDark = document.body.classList.contains('dark');
                ctx.fillStyle = isDark ? 'rgba(200, 200, 200, 0.08)' : 'rgba(150, 150, 150, 0.08)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let currentDate = new Date(minDate);
                currentDate.setHours(12, 0, 0, 0);
                
                while (currentDate <= maxDate) {
                  const x = xAxis.getPixelForValue(currentDate.getTime());
                  const y = yAxis.top + (yAxis.height / 2);
                  const dateStr = currentDate.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' });
                  ctx.fillText(dateStr, x, y);
                  currentDate.setDate(currentDate.getDate() + 1);
                }
                
                ctx.restore();
              }
            }
          }]
        });
        
        // Guardar referencia a datos completos para calcular stats visibles
        charts[eq].allData = complete;
        
        // Agregar drag-select
        setupDragSelect(eq);
      }
      
      // Actualizar estadísticas basadas en lo visible en el viewport actual
      updateVisibleStats(eq);
    }

    // ========== ACTUALIZAR ESTADÍSTICAS VISIBLES ==========
    function updateVisibleStats(eq) {
      const chart = charts[eq];
      if (!chart) return;
      
      const xScale = chart.scales.x;
      const yScale = chart.scales.y;
      const data = chart.data.datasets[0].data;
      
      // Filtrar puntos visibles en el viewport actual
      const visibleData = data.filter(d => {
        return d.x >= xScale.min && d.x <= xScale.max && 
               d.y >= yScale.min && d.y <= yScale.max;
      });
      
      // Verificar si es modo GOL (Balancines)
      const config = MACHINE_CONFIGS[currentMachineType];
      const isGolMode = config.isGolMode || false;
      
      if (isGolMode) {
        // MODO GOL: Mostrar suma total de golpes y cantidad de registros
        const totalGolpes = visibleData.reduce((sum, d) => sum + d.y, 0);
        const cantidadRegistros = visibleData.length;
        
        document.getElementById(`stat-total-${eq}`).textContent = totalGolpes.toLocaleString('es-AR');
        document.getElementById(`stat-avg-${eq}`).textContent = cantidadRegistros;
      } else {
        // MODO NORMAL: Procesos y promedio
        const processes = visibleData.filter(d => !d.isProjected);
        
        if (processes.length > 0) {
          const values = processes.map(d => d.realValue || d.y);
          const avg = Math.round(values.reduce((a, b) => a + b, 0) / values.length);
          document.getElementById(`stat-total-${eq}`).textContent = processes.length;
          document.getElementById(`stat-avg-${eq}`).textContent = avg;
        } else {
          document.getElementById(`stat-total-${eq}`).textContent = 0;
          document.getElementById(`stat-avg-${eq}`).textContent = '-';
        }
      }
    }

    function setupDragSelect(eq) {
      // Evitar agregar event listeners múltiples veces
      if (dragSelectInitialized[eq]) return;
      dragSelectInitialized[eq] = true;
      
      const wrapper = document.getElementById(`wrapper-${eq}`);
      const canvas = document.getElementById(`chart-${eq}`);
      let isDragging = false, isRightDrag = false, startX, startY, selectionBox, selectionTooltip;
      
      // Click-drag con botón derecho para scroll horizontal
      wrapper.addEventListener('contextmenu', (e) => {
        e.preventDefault(); // Prevenir menú contextual
      });
      
      wrapper.addEventListener('mousedown', (e) => {
        if (e.button === 2) { // Botón derecho
          isRightDrag = true;
          startX = e.clientX;
          wrapper.style.cursor = 'grabbing';
          e.preventDefault();
        } else if (e.button === 0 && e.target === canvas) { // Botón izquierdo
          isDragging = true;
          const rect = canvas.getBoundingClientRect();
          startX = e.clientX - rect.left;
          startY = e.clientY - rect.top;
          
          selectionBox = document.createElement('div');
          selectionBox.className = 'selection-box';
          selectionBox.style.left = startX + 'px';
          selectionBox.style.top = startY + 'px';
          wrapper.appendChild(selectionBox);
          
          selectionTooltip = document.createElement('div');
          selectionTooltip.className = 'selection-tooltip';
          wrapper.appendChild(selectionTooltip);
        }
      });
      
      wrapper.addEventListener('mousemove', (e) => {
        if (isRightDrag) {
          // Drag con botón derecho - scroll horizontal
          const deltaX = e.clientX - startX;
          const chart = charts[eq];
          if (!chart) return;
          
          const xScale = chart.scales.x;
          const range = xScale.max - xScale.min;
          const pixelRange = xScale.width;
          const timePerPixel = range / pixelRange;
          const timeShift = -deltaX * timePerPixel;
          
          const settings = equipmentSettings[eq];
          const newMin = xScale.min + timeShift;
          const newMax = xScale.max + timeShift;
          
          const data = equipmentData[eq] || [];
          if (data.length > 0) {
            const dataMin = Math.min(...data.map(d => d.datetime.getTime()));
            const dataMax = Math.max(...data.map(d => d.datetime.getTime()));
            const now = new Date().getTime();
            
            if (newMin >= dataMin && newMax <= Math.max(dataMax, now)) {
              settings.zoomStart = newMin;
              settings.zoomEnd = newMax;
              updateEquipmentChart(eq);
              startX = e.clientX;
            }
          }
          return;
        }
        
        if (!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        let currentX = e.clientX - rect.left;
        let currentY = e.clientY - rect.top;
        
        // Detectar si el mouse llegó al borde del gráfico (1px antes del límite)
        const edgeThreshold = 20;
        let hitEdge = false;
        
        if (currentX <= edgeThreshold) {
          currentX = 0;
          hitEdge = true;
        } else if (currentX >= rect.width - edgeThreshold) {
          currentX = rect.width;
          hitEdge = true;
        }
        
        if (currentY <= edgeThreshold) {
          currentY = 0;
          hitEdge = true;
        } else if (currentY >= rect.height - edgeThreshold) {
          currentY = rect.height;
          hitEdge = true;
        }
        
        // Si llegó al borde, auto-completar la selección
        if (hitEdge) {
          isDragging = false;
          
          if (selectionBox) selectionBox.remove();
          if (selectionTooltip) selectionTooltip.remove();
          
          const chart = charts[eq];
          const xScale = chart.scales.x;
          const yScale = chart.scales.y;
          
          const x1 = xScale.getValueForPixel(Math.min(startX, currentX));
          const x2 = xScale.getValueForPixel(Math.max(startX, currentX));
          const y1 = yScale.getValueForPixel(Math.max(startY, currentY));
          const y2 = yScale.getValueForPixel(Math.min(startY, currentY));
          
          showSummary(eq, x1, x2, y1, y2);
          return;
        }
        
        const width = Math.abs(currentX - startX);
        const height = Math.abs(currentY - startY);
        const left = Math.min(currentX, startX);
        const top = Math.min(currentY, startY);
        
        selectionBox.style.left = left + 'px';
        selectionBox.style.top = top + 'px';
        selectionBox.style.width = width + 'px';
        selectionBox.style.height = height + 'px';
        
        // Actualizar tooltip con info de selección
        const chart = charts[eq];
        const xScale = chart.scales.x;
        const yScale = chart.scales.y;
        
        const x1 = xScale.getValueForPixel(Math.min(startX, currentX));
        const x2 = xScale.getValueForPixel(Math.max(startX, currentX));
        
        const startDate = new Date(x1);
        const endDate = new Date(x2);
        const duration = (x2 - x1) / 1000; // segundos
        const hours = Math.floor(duration / 3600);
        const minutes = Math.floor((duration % 3600) / 60);
        
        selectionTooltip.innerHTML = `
          <div><span class="selection-tooltip-label">Desde:</span> <span class="selection-tooltip-value">${startDate.toLocaleString('es-AR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</span></div>
          <div><span class="selection-tooltip-label">Hasta:</span> <span class="selection-tooltip-value">${endDate.toLocaleString('es-AR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</span></div>
          <div><span class="selection-tooltip-label">Duración:</span> <span class="selection-tooltip-value">${hours}h ${minutes}m</span></div>
        `;
        
        // Posicionar tooltip
        selectionTooltip.style.left = (currentX + 15) + 'px';
        selectionTooltip.style.top = (currentY + 15) + 'px';
      });
      
      wrapper.addEventListener('mouseup', (e) => {
        if (isRightDrag) {
          isRightDrag = false;
          wrapper.style.cursor = 'default';
          return;
        }
        
        if (!isDragging) return;
        isDragging = false;
        
        const rect = canvas.getBoundingClientRect();
        const endX = e.clientX - rect.left;
        const endY = e.clientY - rect.top;
        
        if (selectionBox) selectionBox.remove();
        if (selectionTooltip) selectionTooltip.remove();
        
        const chart = charts[eq];
        const xScale = chart.scales.x;
        const yScale = chart.scales.y;
        
        const x1 = xScale.getValueForPixel(Math.min(startX, endX));
        const x2 = xScale.getValueForPixel(Math.max(startX, endX));
        const y1 = yScale.getValueForPixel(Math.max(startY, endY));
        const y2 = yScale.getValueForPixel(Math.min(startY, endY));
        
        showSummary(eq, x1, x2, y1, y2);
      });
    }

    function showSummary(eq, x1, x2, y1, y2) {
      const chart = charts[eq];
      const data = chart.data.datasets[0].data;
      
      // Filtrar puntos en el área seleccionada
      const inSelection = data.filter(d => d.x >= x1 && d.x <= x2 && d.y >= y1 && d.y <= y2);
      
      // Procesos completados: azules sólidos y círculos huecos
      const processes = inSelection.filter(d => !d.isProjected);
      
      // Piezas perdidas: solo amarillos sólidos (no huecos)
      const yellowsInSelection = inSelection.filter(d => d.isProjected && !d.isHollow);
      
      let validYellows = 0;
      for (const yellow of yellowsInSelection) {
        // Buscar punto azul antes y después
        const beforeBlue = data.find(d => !d.isProjected && d.x < yellow.x && d.x >= x1);
        const afterBlue = data.find(d => !d.isProjected && d.x > yellow.x && d.x <= x2);
        
        if (beforeBlue && afterBlue) {
          validYellows++;
        }
      }
      
      if (processes.length === 0) {
        document.getElementById(`summary-${eq}`).innerHTML = '';
        return;
      }
      
      const values = processes.map(d => d.realValue || d.y);
      const avg = (values.reduce((a, b) => a + b, 0) / values.length).toFixed(1);
      const min = Math.min(...values);
      const max = Math.max(...values);
      
      const startDate = new Date(x1).toLocaleString('es-AR');
      const endDate = new Date(x2).toLocaleString('es-AR');
      
      const duration = (x2 - x1) / 1000;
      const hours = Math.floor(duration / 3600);
      const minutes = Math.floor((duration % 3600) / 60);
      
      document.getElementById(`summary-${eq}`).innerHTML = `
        <div class="summary-panel">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <h4 style="margin: 0;">📊 Resumen de Selección</h4>
            <div style="display: flex; gap: 8px;">
              <button onclick="copySummary('${eq}', '${startDate}', '${endDate}', ${hours}, ${minutes}, ${processes.length}, ${validYellows}, '${avg}', ${min}, ${max})" style="padding: 4px 12px; background: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em;" title="Copiar al portapapeles">📋 Copiar</button>
              <button onclick="zoomToSelection('${eq}', ${x1}, ${x2})" style="padding: 4px 12px; background: #0066ff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em;">🔍 Zoom</button>
              <button onclick="resetZoom('${eq}')" style="padding: 4px 12px; background: #666; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em;">↺ Reset</button>
            </div>
          </div>
          <div class="summary-stats">
            <div class="summary-stat">
              <div class="summary-stat-label">Período</div>
              <div class="summary-stat-value">${startDate}</div>
              <div class="summary-stat-value">${endDate}</div>
            </div>
            <div class="summary-stat">
              <div class="summary-stat-label">Duración</div>
              <div class="summary-stat-value">${hours}h ${minutes}m</div>
            </div>
            <div class="summary-stat">
              <div class="summary-stat-label">Procesos</div>
              <div class="summary-stat-value">${processes.length}</div>
            </div>
            <div class="summary-stat">
              <div class="summary-stat-label">Piezas Perdidas</div>
              <div class="summary-stat-value" style="color: #fbbf24;">${validYellows}</div>
            </div>
            <div class="summary-stat">
              <div class="summary-stat-label">Promedio</div>
              <div class="summary-stat-value">${avg}s</div>
            </div>
            <div class="summary-stat">
              <div class="summary-stat-label">Mínimo</div>
              <div class="summary-stat-value">${min}s</div>
            </div>
            <div class="summary-stat">
              <div class="summary-stat-label">Máximo</div>
              <div class="summary-stat-value">${max}s</div>
            </div>
          </div>
        </div>
      `;
    }

    function zoomToSelection(eq, x1, x2) {
      equipmentSettings[eq].zoomStart = x1;
      equipmentSettings[eq].zoomEnd = x2;
      updateEquipmentChart(eq);
    }

    function resetZoom(eq) {
      equipmentSettings[eq].zoomStart = null;
      equipmentSettings[eq].zoomEnd = null;
      document.getElementById(`summary-${eq}`).innerHTML = '';
      updateEquipmentChart(eq);
    }
    
    function copySummary(eq, startDate, endDate, hours, minutes, processes, lost, avg, min, max) {
      const config = MACHINE_CONFIGS[currentMachineType];
      const summaryText = `📊 Resumen de Selección - Equipo ${eq}
══════════════════════════════════════

Período:
  Desde: ${startDate}
  Hasta: ${endDate}
  Duración: ${hours}h ${minutes}m

Estadísticas:
  Procesos: ${processes}
  Piezas Perdidas: ${lost}
  Promedio: ${avg}s
  Mínimo: ${min}s
  Máximo: ${max}s

Máquina: ${config.name}
Generado: ${new Date().toLocaleString('es-AR')}`;

      navigator.clipboard.writeText(summaryText).then(() => {
        // Feedback visual
        const btn = event.target;
        const originalText = btn.innerHTML;
        btn.innerHTML = '✓ Copiado';
        btn.style.background = '#059669';
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.style.background = '#10b981';
        }, 2000);
      }).catch(err => {
        console.error('Error al copiar:', err);
        alert('No se pudo copiar al portapapeles');
      });
    }

    setInterval(() => loadData(), CONFIG.updateInterval);
    loadData();
  </script>
</body>
</html>
