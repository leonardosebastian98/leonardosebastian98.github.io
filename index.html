<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Multi-Equipo - TM</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; padding: 20px; }
    .container { max-width: 1800px; margin: 0 auto; }
    .header { background: white; border-radius: 12px; padding: 30px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
    .header h1 { font-size: 2em; color: #1a1a1a; }
    .header .subtitle { color: #666; font-size: 0.95em; }
    .machine-selector { display: flex; align-items: center; gap: 10px; }
    .machine-selector label { color: #666; font-weight: 500; }
    .machine-selector select { padding: 8px 12px; border: 2px solid #e9ecef; border-radius: 6px; font-size: 0.9em; cursor: pointer; background: white; }
    .equipment-card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .equipment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
    .equipment-title { font-size: 1.4em; font-weight: 600; color: #1a1a1a; }
    .equipment-stats { display: flex; gap: 20px; font-size: 0.9em; }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-value { font-size: 1.3em; font-weight: 600; color: #0066ff; }
    .stat-label { font-size: 0.85em; color: #999; }
    .chart-controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
    .control-group { display: flex; align-items: center; gap: 10px; }
    .control-group label { color: #666; font-size: 0.85em; font-weight: 500; white-space: nowrap; }
    .time-filters { display: flex; gap: 5px; }
    .time-btn { padding: 6px 12px; border: none; background: white; color: #666; font-size: 0.85em; font-weight: 500; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
    .time-btn:hover { background: #e9ecef; }
    .time-btn.active { background: #0066ff; color: white; }
    .date-inputs { display: flex; align-items: center; gap: 8px; }
    .date-inputs input { padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.85em; }
    .date-inputs input:disabled { background: #f5f5f5; cursor: not-allowed; }
    .btn-clear { padding: 4px 10px; background: #e9ecef; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; color: #666; }
    .btn-clear:hover { background: #dee2e6; }
    .btn-refresh { padding: 6px 12px; background: #0066ff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-weight: 500; }
    .btn-refresh:hover { background: #0052cc; }
    .chart-wrapper { position: relative; height: 400px; cursor: crosshair; }
    .selection-box { position: absolute; border: 2px dashed #0066ff; background: rgba(0, 102, 255, 0.1); pointer-events: none; z-index: 10; }
    .summary-panel { margin-top: 10px; padding: 12px; background: #f0f9ff; border-left: 4px solid #0066ff; border-radius: 4px; }
    .summary-panel h4 { color: #0066ff; margin-bottom: 8px; font-size: 0.9em; }
    .summary-stats { display: flex; gap: 15px; flex-wrap: wrap; }
    .summary-stat { display: flex; flex-direction: column; }
    .summary-stat-label { font-size: 0.75em; color: #666; }
    .summary-stat-value { font-size: 1em; font-weight: 600; color: #1a1a1a; }
    .chart-legend { display: flex; gap: 20px; justify-content: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e9ecef; font-size: 0.85em; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .no-data { text-align: center; padding: 40px; color: #999; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>📊 Monitor Multi-Equipo - TM</h1>
        <div class="subtitle">Controles individuales por equipo</div>
      </div>
      <div class="machine-selector">
        <label>Máquinas:</label>
        <select id="machineSelector" onchange="changeMachineType()">
          <option value="armadoras">Armadoras</option>
          <option value="expansoras">Expansoras</option>
        </select>
      </div>
    </div>
    <div id="equipmentContainer"></div>
  </div>

  <script>
    const MACHINE_CONFIGS = {
      armadoras: {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVrHs_GXmZGUMaOBjo4zr6mtNbFpf45WZ916Bj6LktK0i1F1gofWV_dnZfjam7MAbhDoQap_nZryeO/pub?gid=0&single=true&output=csv',
        name: 'Armadoras',
        tco: 240
      },
      expansoras: {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkBYlgzc71g76k03IhGUA29lNMKjJl1rgB9WwzXcxT4uHgvzsySXs5tAuQHqQKglMLFgao6u4enqPC/pub?gid=0&single=true&output=csv',
        name: 'Expansoras',
        tco: 35
      }
    };

    let currentMachineType = 'armadoras';
    const CONFIG = { filterCode: 'TM', updateInterval: 10000 };
    let equipmentData = {}, charts = {}, lastDataHash = '';
    let equipmentSettings = {}; // Configuración individual por equipo

    // Convertir fecha a día laboral (6am-6am)
    function toWorkDay(date) {
      const d = new Date(date);
      if (d.getHours() < 6) {
        // Si es antes de las 6am, pertenece al día laboral anterior
        d.setDate(d.getDate() - 1);
      }
      d.setHours(6, 0, 0, 0);
      return d;
    }

    // Obtener inicio y fin de día laboral
    function getWorkDayBounds(date) {
      const start = toWorkDay(date);
      const end = new Date(start.getTime() + (24 * 60 * 60 * 1000)); // +24 horas
      return { start, end };
    }

    function changeMachineType() {
      const newType = document.getElementById('machineSelector').value;
      if (newType !== currentMachineType) {
        currentMachineType = newType;
        equipmentData = {};
        lastDataHash = '';
        Object.keys(charts).forEach(eq => charts[eq]?.destroy());
        charts = {};
        equipmentSettings = {};
        document.getElementById('equipmentContainer').innerHTML = '<div class="no-data">Cargando...</div>';
        loadData();
      }
    }

    async function loadData() {
      try {
        const r = await fetch(MACHINE_CONFIGS[currentMachineType].csvUrl);
        if (!r.ok) throw new Error(`HTTP:${r.status}`);
        processData(await r.text());
        return true;
      } catch (e) {
        console.error('❌', e);
        document.getElementById('equipmentContainer').innerHTML = `<div class="no-data">❌ Error: ${e.message}</div>`;
        return false;
      }
    }

    function processData(csv) {
      const lines = csv.split('\n'), dataByEq = {}, seen = {};
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const c = line.split(',');
        if (c.length < 8) continue;
        const eq = c[2]?.trim(), cod = c[6]?.trim(), date = c[4]?.trim(), time = c[5]?.trim(), val = parseInt(c[7]?.trim()) || 0;
        if (cod === CONFIG.filterCode && eq) {
          if (!dataByEq[eq]) {
            dataByEq[eq] = [];
            seen[eq] = new Set();
          }
          const key = `${date}-${time}`;
          if (!seen[eq].has(key)) {
            seen[eq].add(key);
            const dt = parseDateTime(date, time);
            if (dt) dataByEq[eq].push({ datetime: dt, value: val });
          }
        }
      }
      for (let eq in dataByEq) dataByEq[eq].sort((a, b) => a.datetime - b.datetime);
      const newHash = generateDataHash(dataByEq);
      if (newHash !== lastDataHash) {
        equipmentData = dataByEq;
        lastDataHash = newHash;
        renderEquipmentCharts();
      }
    }

    function parseDateTime(d, t) {
      try {
        const dp = d.split('/');
        let day = parseInt(dp[0]), mon = parseInt(dp[1]), year = parseInt(dp[2]);
        if (year < 100) year = year < 50 ? 2000 + year : 1900 + year;
        const tp = t.split(':'), h = parseInt(tp[0]) || 0, m = parseInt(tp[1]) || 0, s = parseInt(tp[2]) || 0;
        return new Date(year, mon - 1, day, h, m, s);
      } catch { return null; }
    }

    function generateDataHash(data) {
      const keys = Object.keys(data).sort();
      let h = '';
      keys.forEach(e => {
        const d = data[e];
        if (d.length > 0) {
          const l = d[d.length - 1];
          h += `${e}-${d.length}-${l.datetime.getTime()}-${l.value}|`;
        }
      });
      return h;
    }

    function renderEquipmentCharts() {
      const cont = document.getElementById('equipmentContainer'), eqs = Object.keys(equipmentData).sort();
      if (eqs.length === 0) {
        cont.innerHTML = '<div class="no-data">No hay datos</div>';
        return;
      }
      eqs.forEach(eq => {
        if (!document.getElementById(`equipment-${eq}`)) {
          // Inicializar configuración del equipo
          equipmentSettings[eq] = {
            filter: 1440,
            pointSize: 4,
            dateFrom: null,
            dateTo: null,
            selection: null,
            zoomStart: null,
            zoomEnd: null
          };
          cont.appendChild(createEquipmentCard(eq));
        }
        updateEquipmentChart(eq);
      });
    }

    function createEquipmentCard(eq) {
      const card = document.createElement('div');
      card.className = 'equipment-card';
      card.id = `equipment-${eq}`;
      card.innerHTML = `
        <div class="equipment-header">
          <div class="equipment-title">Equipo ${eq}</div>
          <div class="equipment-stats">
            <div class="stat-item">
              <div class="stat-value" id="stat-total-${eq}">0</div>
              <div class="stat-label">Procesos</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="stat-avg-${eq}">0</div>
              <div class="stat-label">Promedio (s)</div>
            </div>
          </div>
        </div>
        
        <div class="chart-controls">
          <div class="control-group">
            <label>Tamaño:</label>
            <input type="range" min="1" max="10" value="4" style="width:80px" oninput="updatePointSize('${eq}', this.value)">
            <span id="size-${eq}">4px</span>
          </div>
          
          <div class="time-filters">
            <button class="time-btn" onclick="setTimeFilter('${eq}', 60)">1H</button>
            <button class="time-btn" onclick="setTimeFilter('${eq}', 360)">6H</button>
            <button class="time-btn" onclick="setTimeFilter('${eq}', 720)">12H</button>
            <button class="time-btn active" onclick="setTimeFilter('${eq}', 1440)">24H</button>
            <button class="time-btn" onclick="setTimeFilter('${eq}', 10080)">SEMANA</button>
          </div>
          
          <div class="date-inputs">
            <label>Desde:</label>
            <input type="date" id="dateFrom-${eq}" onchange="updateDateFrom('${eq}')">
            <label>Hasta:</label>
            <input type="date" id="dateTo-${eq}" disabled onchange="updateDateTo('${eq}')">
            <button class="btn-clear" onclick="clearDates('${eq}')">Limpiar</button>
          </div>
          
          <button class="btn-refresh" onclick="updateEquipmentChart('${eq}')">↻</button>
        </div>
        
        <div class="chart-wrapper" id="wrapper-${eq}">
          <canvas id="chart-${eq}"></canvas>
        </div>
        
        <div id="summary-${eq}"></div>
        
        <div class="chart-legend">
          <div class="legend-item">
            <div class="legend-dot" style="background:#0066ff"></div>
            <span>Procesos</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:white; border: 2px solid #0066ff;"></div>
            <span>Proceso lento</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:#fbbf24"></div>
            <span>Perdidas</span>
          </div>
        </div>
      `;
      return card;
    }

    function updatePointSize(eq, size) {
      equipmentSettings[eq].pointSize = parseInt(size);
      document.getElementById(`size-${eq}`).textContent = size + 'px';
      if (charts[eq]) {
        charts[eq].data.datasets[0].pointRadius = parseInt(size);
        charts[eq].update('none');
      }
    }

    function setTimeFilter(eq, minutes) {
      equipmentSettings[eq].filter = minutes;
      document.querySelectorAll(`#equipment-${eq} .time-btn`).forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      updateEquipmentChart(eq);
    }

    function updateDateFrom(eq) {
      const val = document.getElementById(`dateFrom-${eq}`).value;
      if (val) {
        const selectedDate = new Date(val);
        const workDay = getWorkDayBounds(selectedDate);
        equipmentSettings[eq].dateFrom = workDay.start;
        document.getElementById(`dateTo-${eq}`).disabled = false;
      } else {
        equipmentSettings[eq].dateFrom = null;
        document.getElementById(`dateTo-${eq}`).disabled = true;
        document.getElementById(`dateTo-${eq}`).value = '';
        equipmentSettings[eq].dateTo = null;
      }
      updateEquipmentChart(eq);
    }

    function updateDateTo(eq) {
      const val = document.getElementById(`dateTo-${eq}`).value;
      if (val) {
        const selectedDate = new Date(val);
        const workDay = getWorkDayBounds(selectedDate);
        equipmentSettings[eq].dateTo = workDay.end;
      } else {
        equipmentSettings[eq].dateTo = null;
      }
      updateEquipmentChart(eq);
    }

    function clearDates(eq) {
      document.getElementById(`dateFrom-${eq}`).value = '';
      document.getElementById(`dateTo-${eq}`).value = '';
      document.getElementById(`dateTo-${eq}`).disabled = true;
      equipmentSettings[eq].dateFrom = null;
      equipmentSettings[eq].dateTo = null;
      equipmentSettings[eq].zoomStart = null;
      equipmentSettings[eq].zoomEnd = null;
      updateEquipmentChart(eq);
    }

    function updateEquipmentChart(eq) {
      const settings = equipmentSettings[eq];
      let data = equipmentData[eq] || [];
      
      // Filtrar por tiempo o fechas
      if (settings.dateFrom || settings.dateTo) {
        data = data.filter(d => {
          if (settings.dateFrom && settings.dateTo) {
            return d.datetime >= settings.dateFrom && d.datetime <= settings.dateTo;
          } else if (settings.dateFrom) {
            return d.datetime >= settings.dateFrom;
          } else if (settings.dateTo) {
            return d.datetime <= settings.dateTo;
          }
          return true;
        });
      } else if (settings.filter) {
        const now = new Date(), cutoff = new Date(now.getTime() - (settings.filter * 60 * 1000));
        data = data.filter(d => d.datetime >= cutoff);
      }
      
      if (data.length === 0) return;
      
      const tco = MACHINE_CONFIGS[currentMachineType].tco;
      const maxAllowed = tco * 4;
      
      // NO filtrar, procesar todos los datos
      const avgInt = tco * 1000;
      const validForAvg = data.filter(d => d.value <= maxAllowed);
      const avgVal = validForAvg.length > 0 ? Math.round(validForAvg.reduce((s, d) => s + d.value, 0) / validForAvg.length) : tco;
      const complete = [];
      let lastRealTime = null;
      
      for (let i = 0; i < data.length; i++) {
        const cur = data[i];
        const isOverLimit = cur.value > maxAllowed;
        
        if (lastRealTime) {
          const gap = cur.datetime - lastRealTime;
          
          if (gap > avgInt * 3 || isOverLimit) {
            // Rellenar gap con amarillos
            let pt = new Date(lastRealTime.getTime() + avgInt);
            const targetTime = cur.datetime;
            
            while (pt < targetTime) {
              complete.push({ x: pt.getTime(), y: tco, isProjected: true, isHollow: false });
              pt = new Date(pt.getTime() + avgInt);
            }
            
            if (isOverLimit) {
              // Punto sobre límite: círculo azul hueco en altura TCO
              complete.push({ x: cur.datetime.getTime(), y: tco, isProjected: false, isHollow: true, realValue: cur.value });
              
              // Agregar puntos amarillos por el tiempo excedente
              const extraTime = (cur.value - tco) * 1000;
              const yellowCount = Math.floor(extraTime / avgInt);
              
              for (let j = 1; j <= yellowCount; j++) {
                const yellowTime = new Date(cur.datetime.getTime() + (j * avgInt));
                complete.push({ x: yellowTime.getTime(), y: tco, isProjected: true, isHollow: false });
              }
            } else {
              // Punto normal después de gap
              const adjustedTime = new Date(pt.getTime() - avgInt + avgInt);
              complete.push({ x: adjustedTime.getTime(), y: cur.value, isProjected: false, isHollow: false });
            }
          } else {
            // Sin gap ni sobre límite
            complete.push({ x: cur.datetime.getTime(), y: cur.value, isProjected: false, isHollow: false });
          }
        } else {
          // Primer punto
          if (isOverLimit) {
            complete.push({ x: cur.datetime.getTime(), y: tco, isProjected: false, isHollow: true, realValue: cur.value });
            
            const extraTime = (cur.value - tco) * 1000;
            const yellowCount = Math.floor(extraTime / avgInt);
            
            for (let j = 1; j <= yellowCount; j++) {
              const yellowTime = new Date(cur.datetime.getTime() + (j * avgInt));
              complete.push({ x: yellowTime.getTime(), y: tco, isProjected: true, isHollow: false });
            }
          } else {
            complete.push({ x: cur.datetime.getTime(), y: cur.value, isProjected: false, isHollow: false });
          }
        }
        
        lastRealTime = cur.datetime;
      }
      
      // Proyecciones
      const now = new Date(), since = now - lastRealTime;
      if (since > avgInt * 3) {
        let pt = new Date(lastRealTime.getTime() + avgInt);
        while (pt <= now) {
          complete.push({ x: pt.getTime(), y: tco, isProjected: true, isHollow: false });
          pt = new Date(pt.getTime() + avgInt);
        }
      }
      
      // Contar solo puntos válidos (no huecos ni proyectados) para estadísticas
      const validPoints = complete.filter(d => !d.isProjected && !d.isHollow);
      document.getElementById(`stat-total-${eq}`).textContent = validPoints.length;
      document.getElementById(`stat-avg-${eq}`).textContent = avgVal;
      
      const colors = complete.map(d => {
        if (d.isHollow) return 'rgba(0, 102, 255, 0)'; // Transparente para círculos huecos
        return d.isProjected ? '#fbbf24' : '#0066ff';
      });
      
      const borderColors = complete.map(d => {
        if (d.isHollow) return '#0066ff'; // Borde azul para círculos huecos
        return d.isProjected ? '#fbbf24' : '#0066ff';
      });
      
      const borderWidths = complete.map(d => d.isHollow ? 2 : 0);
      
      // Divisiones de tiempo
      let timeUnit = 'hour', timeStep = 1;
      if (settings.filter === 60) { timeUnit = 'minute'; timeStep = 5; }
      else if (settings.filter === 360) { timeUnit = 'minute'; timeStep = 15; }
      else if (settings.filter === 720) { timeUnit = 'minute'; timeStep = 30; }
      else if (settings.filter === 1440) { timeUnit = 'hour'; timeStep = 1; }
      else if (settings.filter === 10080) { timeUnit = 'day'; timeStep = 1; }
      
      // Límites
      let minTime, maxTime;
      if (settings.zoomStart && settings.zoomEnd) {
        // Si hay zoom activo, usar esos límites
        minTime = new Date(settings.zoomStart);
        maxTime = new Date(settings.zoomEnd);
      } else if (settings.dateFrom || settings.dateTo) {
        minTime = settings.dateFrom || new Date(settings.dateTo.getTime() - (30 * 24 * 60 * 60 * 1000));
        maxTime = settings.dateTo || new Date(settings.dateFrom.getTime() + (30 * 24 * 60 * 60 * 1000));
      } else {
        minTime = new Date(now.getTime() - (settings.filter * 60 * 1000));
        maxTime = now;
      }
      
      const ctx = document.getElementById(`chart-${eq}`).getContext('2d');
      
      if (charts[eq]) {
        charts[eq].data.datasets[0].data = complete;
        charts[eq].data.datasets[0].pointBackgroundColor = colors;
        charts[eq].data.datasets[0].pointBorderColor = borderColors;
        charts[eq].data.datasets[0].pointBorderWidth = borderWidths;
        charts[eq].options.scales.x.time.unit = timeUnit;
        charts[eq].options.scales.x.time.stepSize = timeStep;
        charts[eq].options.scales.x.min = minTime.getTime();
        charts[eq].options.scales.x.max = maxTime.getTime();
        charts[eq].update('none');
      } else {
        charts[eq] = new Chart(ctx, {
          type: 'scatter',
          data: {
            datasets: [{
              data: complete,
              pointRadius: settings.pointSize,
              pointBackgroundColor: colors,
              pointBorderColor: borderColors,
              pointBorderWidth: borderWidths,
              showLine: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                enabled: true,
                backgroundColor: 'rgba(0,0,0,0.9)',
                padding: {
                  top: Math.max(15, window.innerHeight * 0.015),
                  bottom: Math.max(15, window.innerHeight * 0.015),
                  left: Math.max(20, window.innerWidth * 0.01),
                  right: Math.max(20, window.innerWidth * 0.01)
                },
                titleFont: { size: Math.max(16, window.innerHeight * 0.02), weight: 'bold' },
                bodyFont: { size: Math.max(18, window.innerHeight * 0.022) },
                displayColors: false,
                cornerRadius: 8,
                caretSize: 8,
                callbacks: {
                  title: i => new Date(i[0].parsed.x).toLocaleString('es-AR'),
                  label: c => {
                    const point = complete[c.dataIndex];
                    if (point.isHollow) {
                      return `🔵 Proceso lento: ${point.realValue} seg (excede TCO)`;
                    }
                    const p = c.dataset.pointBackgroundColor[c.dataIndex] === '#fbbf24';
                    return (p ? '⚠️ Perdida: ' : 'Tiempo: ') + c.parsed.y + ' seg';
                  }
                }
              }
            },
            scales: {
              x: {
                type: 'time',
                min: minTime.getTime(),
                max: maxTime.getTime(),
                time: {
                  unit: timeUnit,
                  stepSize: timeStep,
                  displayFormats: { hour: 'HH:mm', minute: 'HH:mm', day: 'dd/MM' }
                },
                grid: { color: 'rgba(0,0,0,0.05)' },
                ticks: { color: '#666', maxRotation: 0, autoSkip: false }
              },
              y: {
                beginAtZero: true,
                grid: { color: 'rgba(0,0,0,0.05)' },
                ticks: { color: '#666' }
              }
            }
          }
        });
        
        // Agregar drag-select
        setupDragSelect(eq);
      }
    }

    function setupDragSelect(eq) {
      const wrapper = document.getElementById(`wrapper-${eq}`);
      const canvas = document.getElementById(`chart-${eq}`);
      let isDragging = false, startX, startY, selectionBox;
      
      wrapper.addEventListener('mousedown', (e) => {
        if (e.target !== canvas) return;
        isDragging = true;
        const rect = canvas.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        
        selectionBox = document.createElement('div');
        selectionBox.className = 'selection-box';
        selectionBox.style.left = startX + 'px';
        selectionBox.style.top = startY + 'px';
        wrapper.appendChild(selectionBox);
      });
      
      wrapper.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        const currentX = e.clientX - rect.left;
        const currentY = e.clientY - rect.top;
        
        const width = Math.abs(currentX - startX);
        const height = Math.abs(currentY - startY);
        const left = Math.min(currentX, startX);
        const top = Math.min(currentY, startY);
        
        selectionBox.style.left = left + 'px';
        selectionBox.style.top = top + 'px';
        selectionBox.style.width = width + 'px';
        selectionBox.style.height = height + 'px';
      });
      
      wrapper.addEventListener('mouseup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        
        const rect = canvas.getBoundingClientRect();
        const endX = e.clientX - rect.left;
        const endY = e.clientY - rect.top;
        
        if (selectionBox) selectionBox.remove();
        
        // Calcular área seleccionada
        const chart = charts[eq];
        const xScale = chart.scales.x;
        const yScale = chart.scales.y;
        
        const x1 = xScale.getValueForPixel(Math.min(startX, endX));
        const x2 = xScale.getValueForPixel(Math.max(startX, endX));
        const y1 = yScale.getValueForPixel(Math.max(startY, endY));
        const y2 = yScale.getValueForPixel(Math.min(startY, endY));
        
        showSummary(eq, x1, x2, y1, y2);
      });
    }

    function showSummary(eq, x1, x2, y1, y2) {
      const chart = charts[eq];
      const data = chart.data.datasets[0].data;
      
      const selected = data.filter(d => {
        return d.x >= x1 && d.x <= x2 && d.y >= y1 && d.y <= y2 && !d.isProjected;
      });
      
      if (selected.length === 0) {
        document.getElementById(`summary-${eq}`).innerHTML = '';
        return;
      }
      
      const values = selected.map(d => d.y);
      const avg = (values.reduce((a, b) => a + b, 0) / values.length).toFixed(1);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const total = selected.length;
      
      const startDate = new Date(x1).toLocaleString('es-AR');
      const endDate = new Date(x2).toLocaleString('es-AR');
      
      document.getElementById(`summary-${eq}`).innerHTML = `
        <div class="summary-panel">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <h4 style="margin: 0;">📊 Resumen de Selección</h4>
            <div style="display: flex; gap: 8px;">
              <button onclick="zoomToSelection('${eq}', ${x1}, ${x2})" style="padding: 4px 12px; background: #0066ff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em;">🔍 Zoom</button>
              <button onclick="resetZoom('${eq}')" style="padding: 4px 12px; background: #666; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em;">↺ Reset</button>
            </div>
          </div>
          <div class="summary-stats">
            <div class="summary-stat">
              <div class="summary-stat-label">Período</div>
              <div class="summary-stat-value">${startDate} - ${endDate}</div>
            </div>
            <div class="summary-stat">
              <div class="summary-stat-label">Procesos</div>
              <div class="summary-stat-value">${total}</div>
            </div>
            <div class="summary-stat">
              <div class="summary-stat-label">Promedio</div>
              <div class="summary-stat-value">${avg}s</div>
            </div>
            <div class="summary-stat">
              <div class="summary-stat-label">Mínimo</div>
              <div class="summary-stat-value">${min}s</div>
            </div>
            <div class="summary-stat">
              <div class="summary-stat-label">Máximo</div>
              <div class="summary-stat-value">${max}s</div>
            </div>
          </div>
        </div>
      `;
    }

    function zoomToSelection(eq, x1, x2) {
      equipmentSettings[eq].zoomStart = x1;
      equipmentSettings[eq].zoomEnd = x2;
      updateEquipmentChart(eq);
    }

    function resetZoom(eq) {
      equipmentSettings[eq].zoomStart = null;
      equipmentSettings[eq].zoomEnd = null;
      document.getElementById(`summary-${eq}`).innerHTML = '';
      updateEquipmentChart(eq);
    }

    setInterval(() => loadData(), CONFIG.updateInterval);
    loadData();
  </script>
</body>
</html>
